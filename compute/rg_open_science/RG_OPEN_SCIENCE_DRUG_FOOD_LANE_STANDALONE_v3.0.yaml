implementation_checklist:
- parse YAML without custom implicit semantics
- validate required cards and types
- freeze hashes before fitting
- implement numerical norms and tolerances exactly as declared
- never coerce UNRESOLVED to zero
- retain lineage from report fields to raw tape
- emit named defects at every approximate bridge
- use an independent held-out checker for predictive claims
- keep exact molecule and synthesis generation disabled
