      \    - concrete_operator_and_data_encoding\n    - frozen_parameter_calibration\n    - held_out_checker_with_controls\n\
      \n  conditional_or_open:\n    - unique_concrete_universal_action\n    - unique_domain_emergence_from_root\n   \
      \ - generalized_machine_checked_operator_theory\n    - full_endogenous_geometry_backreaction\n    - universal_continuum_limit\n\
      \    - universal_empirical_calibration\n    - measurement_and_probability_foundations\n    - spin_statistics\n\
      \    - complete_cross_domain_predictions\n    - primitive_constants_from_root\n\n  final_boundary:\n    valid_description:\n\
      \      - \"Universal Research and Derivation Architecture\"\n      - \"Philosophy-Governed Human–AI Executable\
      \ Specification\"\n      - \"Finite Reference Kernel with Fail-Closed Verification\"\n    invalid_description:\n\
      \      - \"Complete Final Law of Nature\"\n      - \"Empirically Proven Theory of Every Domain\"\n```\n\n---\n\n\
      # 32. One-box summary\n\n\\[\n\\boxed{\n\\begin{gathered}\n\\textbf{Information Philosophy}\n\\\\\n\\Downarrow\n\
      \\\\\n\\delta_R,\\mathcal T,\\mathcal O,\\mathcal C,G\n\\\\\n\\Downarrow\n\\\\\nZ_n=\n(\\Phi,\\Psi,\\Theta,\\Sigma,\\\
      mathcal T,G,\\mathcal L^{cl};U,\\Gamma,\\Xi)_n\n\\\\\n\\Downarrow\n\\\\\n\\text{Sufficiency}\n\\rightarrow\n\\\
      text{Equivalence}\n\\rightarrow\n\\text{Automorphism}\n\\rightarrow\n\\text{Transport}\n\\rightarrow\n\\text{Closure}\n\
      \\\\\n\\Downarrow\n\\\\\nP_{\\mathrm{phys}}\n\\left[\n\\delta S_{\\mathrm{RG}}\n+\n\\lambda\\,\\delta C\n\\right]\n\
      =0\n\\\\\n\\Downarrow\n\\\\\nT_+\n=\nP_{\\mathrm{phys}}e^{-V/2}A^\\dagger A e^{-V/2}P_{\\mathrm{phys}}\n\\succeq0\n\
      \\\\\n\\Downarrow\n\\\\\n\\text{Quotient}\n+\n\\boldsymbol\\epsilon_D\n+\n\\text{Calibration Freeze}\n+\n\\text{Independent\
      \ Checker}\n\\\\\n\\Downarrow\n\\\\\n\\textbf{PASS / FAIL / UNRESOLVED}\n\\\\\n\\Downarrow\n\\\\\n\\textbf{Bounded\
      \ Claim}\n\\end{gathered}\n}\n\\]\n\nSummary:\n\n> **Differences are retained before they are named. Structure\
      \ is checked before it is translated. Meaning follows readout. Claims are emitted only after computation, defect\
      \ control, freezing, and independent checking.**\n\nThis principle makes information philosophy the governing logic\
      \ of equation construction, computation, translation, and reporting—not an external commentary on them.\n"
embedded_runtime:
  language: Python
  minimum_python: '3.10'
  dependencies:
  - pyyaml
  - numpy
  source_filename: rg_t2d_numeric_benchmark.py
  sha256: c8ce5ddd35da72135c47bdc673c19b08e07df9810cbc5d1d5ae526a92fafa7e6
  source: "#!/usr/bin/env python3\n\"\"\"\nSafe synthetic T2D lane benchmark for RG-BDFLC v1.1.\n\nThis script validates\
    \ and runs a normalized systems-level simulation only.\nIt does not generate molecular structures, docking inputs,\
    \ doses, or clinical predictions.\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport json\nfrom\
    \ pathlib import Path\n\nimport numpy as np\nimport yaml\n\n\ndef _matrix(pkg: dict, name: str) -> np.ndarray:\n\
    \    return np.asarray(pkg[\"lane_card_numeric\"][\"frozen_matrices\"][name], dtype=float)\n\n\ndef exposure(F: np.ndarray,\
    \ G: np.ndarray, administration: np.ndarray) -> np.ndarray:\n    x = np.zeros(F.shape[0], dtype=float)\n    rows\
    \ = []\n    for value in administration:\n        x = F @ x + G[:, 0] * float(value)\n        if not np.isfinite(x).all():\n\
    \            raise FloatingPointError(\"Non-finite exposure state\")\n        rows.append(x.copy())\n    return np.asarray(rows)\n\
    \n\ndef hill(x: np.ndarray, ec50: float, n: float) -> np.ndarray:\n    x = np.maximum(x, 0.0)\n    return x**n /\
    \ (ec50**n + x**n + 1e-12)\n\n\ndef pulse(steps: int, magnitude: float, delay: int) -> np.ndarray:\n    p = np.zeros(steps,\
    \ dtype=float)\n    if not 0 <= delay < steps:\n        raise ValueError(\"Delay must be within the simulation horizon\"\
    )\n    p[delay] = magnitude\n    return p\n\n\ndef simulate(pkg: dict, a_magnitude: float, b_magnitude: float,\n\
    \             a_delay: int = 0, b_delay: int = 0, sign_flip_b: bool = False) -> dict:\n    if a_magnitude < 0 or\
    \ b_magnitude < 0:\n        raise ValueError(\"Magnitudes must be non-negative normalized test inputs\")\n\n    A\
    \ = _matrix(pkg, \"A_lane\")\n    B = _matrix(pkg, \"B_lane\")\n    C = _matrix(pkg, \"C_lane\")\n    D = _matrix(pkg,\
    \ \"D_lane\")\n\n    steps = int(pkg[\"problem_card\"][\"horizon_steps\"])\n    meal = np.zeros(steps, dtype=float)\n\
    \    meal[:3] = [1.0, 0.6, 0.2]\n\n    ma = pkg[\"exposure_response_models\"][\"module_A\"]\n    mb = pkg[\"exposure_response_models\"\
    ][\"module_B\"]\n    FA = np.asarray(ma[\"F_A\"], dtype=float)\n    GA = np.asarray(ma[\"G_A\"], dtype=float)\n \
    \   FB = np.asarray(mb[\"F_B\"], dtype=float)\n    GB = np.asarray(mb[\"G_B\"], dtype=float)\n\n    ea = exposure(FA,\
    \ GA, pulse(steps, a_magnitude, a_delay))\n    eb = exposure(FB, GB, pulse(steps, b_magnitude, b_delay))\n\n    ra\
    \ = ma[\"reader\"]\n    rb = mb[\"reader\"]\n    ua = hill(ea[:, 2], float(ra[\"EC50_normalized\"]), float(ra[\"\
    hill_n\"]))\n    ub = hill(eb[:, 2], float(rb[\"EC50_normalized\"]), float(rb[\"hill_n\"]))\n    if sign_flip_b:\n\
    \        ub = -ub\n\n    ua_eff = ua * (1.0 - 0.05 * np.maximum(ub, 0.0))\n    joint = ua_eff * ub\n\n    z = np.zeros(A.shape[0],\
    \ dtype=float)\n    states, readouts = [], []\n    for t in range(steps):\n        u = np.asarray([meal[t], ua_eff[t],\
    \ ub[t], joint[t]], dtype=float)\n        states.append(z.copy())\n        readouts.append(C @ z + D @ u)\n     \
    \   z = A @ z + B @ u\n        if not np.isfinite(z).all():\n            raise FloatingPointError(\"Non-finite lane\
    \ state\")\n\n    states = np.asarray(states)\n    readouts = np.asarray(readouts)\n    safety = (\n        0.35\
    \ * np.maximum(ua_eff, 0.0)\n        + 0.40 * np.maximum(ub, 0.0)\n        + 0.10 * np.maximum(joint, 0.0)\n    )\n\
    \n    return {\n        \"label\": \"[SimulatedData]\",\n        \"summary\": {\n            \"glycemia_auc_normalized\"\
    : float(np.sum(np.maximum(readouts[:, 0], 0.0))),\n            \"glycemia_peak_normalized\": float(np.max(readouts[:,\
    \ 0])),\n            \"insulin_proxy_auc\": float(np.sum(np.maximum(readouts[:, 1], 0.0))),\n            \"glucagon_proxy_auc\"\
    : float(np.sum(readouts[:, 2])),\n            \"renal_reabsorption_proxy_auc\": float(np.sum(readouts[:, 3])),\n\
    \            \"gut_flux_auc_normalized\": float(np.sum(np.maximum(readouts[:, 4], 0.0))),\n            \"safety_proxy_max\"\
    : float(np.max(safety)),\n        },\n        \"readouts\": readouts.tolist(),\n        \"states\": states.tolist(),\n\
    \    }\n\n\ndef checker(pkg: dict) -> dict:\n    baseline = simulate(pkg, 0.0, 0.0)\n    positive = simulate(pkg,\
    \ 1.2, 1.2)\n    negative = simulate(pkg, 1.2, 1.2, sign_flip_b=True)\n\n    b = baseline[\"summary\"][\"glycemia_auc_normalized\"\
    ]\n    p = positive[\"summary\"][\"glycemia_auc_normalized\"]\n    n = negative[\"summary\"][\"glycemia_auc_normalized\"\
    ]\n\n    reduction = (b - p) / b\n    increase = (n - b) / b\n    return {\n        \"label\": \"[SimulatedData]\"\
    ,\n        \"positive_control_reduction_fraction\": reduction,\n        \"positive_control_status\": \"PASS\" if\
    \ reduction >= 0.15 else \"FAIL\",\n        \"negative_control_increase_fraction\": increase,\n        \"negative_control_status\"\
    : \"PASS\" if increase >= 0.05 else \"FAIL\",\n        \"overall\": \"PASS_SIMULATED_ONLY\"\n        if reduction\
    \ >= 0.15 and increase >= 0.05\n        else \"FAIL\",\n    }\n\n\ndef main() -> None:\n    parser = argparse.ArgumentParser()\n\
    \    parser.add_argument(\"--yaml\", default=\"RG_BDFLC_T2D_NUMERIC_SAFE_STANDALONE_v1.1.yaml\")\n    parser.add_argument(\"\
    --a\", type=float, default=1.2)\n    parser.add_argument(\"--b\", type=float, default=1.2)\n    parser.add_argument(\"\
    --a-delay\", type=int, default=0)\n    parser.add_argument(\"--b-delay\", type=int, default=0)\n    parser.add_argument(\"\
    --checker\", action=\"store_true\")\n    args = parser.parse_args()\n\n    path = Path(args.yaml)\n    with path.open(\"\
    r\", encoding=\"utf-8\") as f:\n        full = yaml.safe_load(f)\n    pkg = full[\"numeric_domain_packages\"][\"\
    T2D_SAFE_BENCHMARK\"]\n\n    result = checker(pkg) if args.checker else simulate(\n        pkg, args.a, args.b, args.a_delay,\
    \ args.b_delay\n    )\n    print(json.dumps(result, ensure_ascii=False, indent=2))\n\n\nif __name__ == \"__main__\"\
    :\n    main()\n"
  extraction_rule: Write embedded_runtime.source exactly as UTF-8 to source_filename, then run against this standalone
    YAML.
