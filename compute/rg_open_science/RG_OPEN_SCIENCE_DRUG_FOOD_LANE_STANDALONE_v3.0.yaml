      \ is fail-closed:\n\n```text\nDRIFT or PROTOCOL_FAIL > FAIL > UNRESOLVED > PASS_TOLERANCED > PASS_EXACT\n```\n\n\
      A higher-precedence status overrides every lower-precedence status.\n\n| Situation | Status | Required action |\n\
      |---|---|---|\n| All required exact defects are zero | PASS_EXACT | emit exact-within-scope claim |\n| All required\
      \ numerical defects are within frozen tolerance | PASS_TOLERANCED | emit numerical/finite claim |\n| A required\
      \ defect exceeds tolerance | FAIL | name defect and failure code |\n| Candidate state is insufficient | FAIL_STATE\
      \ | enlarge state; do not patch output |\n| Identifiability rank is deficient | UNRESOLVED | abstain; acquire more\
      \ distinctions |\n| Positive control passes but no failing control exists | TYPE_U_ONLY | at most conditional wording\
      \ |\n| Maker saw held-out answer | PROTOCOL_FAIL | invalidate independent evidence claim |\n| Root contains domain-final\
      \ law | DRIFT | reject run before calculation |\n| Calibration absent for named physical quantity | UNCALIBRATED\
      \ | return native value only |\n| Scalar reduction drops coupling | REDUCTION_FAIL | use full operator |\n| Projector\
