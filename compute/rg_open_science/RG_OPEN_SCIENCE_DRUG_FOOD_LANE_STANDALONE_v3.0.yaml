    - positive and negative controls under the same protocol
    - ethics and regulatory approvals
standalone_manifest:
  entrypoints:
    validate: validate all schemas, hashes, matrices and embedded runtime
    run_t2d_checker: run frozen [SimulatedData] positive and negative controls
    summarize_candidate: return the abstract T2D candidate-family design
    emit_docking_admission_template: return blank receptor, ligand, pocket and docking cards; does not create structures
      or coordinates
    list_tools: list local libraries or remote scientific sources
    dependency_check: check installed Python imports by profile
    workflow_plan: emit an auditable workflow DAG
    adapter_template: emit a provenance-safe remote adapter request template
    requirements: emit dependency package list by profile
  modules:
  - module_id: CORE_BIDIRECTIONAL_COMPILER
    status: INTEGRATED
    origin: RG_BDFLC_T2D_NUMERIC_SAFE_STANDALONE_v1.1.yaml
  - module_id: T2D_SAFE_NUMERIC_BENCHMARK
    status: INTEGRATED_SIMULATED_ONLY
    origin: RG_BDFLC_T2D_NUMERIC_SAFE_STANDALONE_v1.1.yaml
  - module_id: T2D_ABSTRACT_CANDIDATE_RUN
    status: INTEGRATED_MECHANISTIC_HYPOTHESIS
    origin: RG_T2D_ABSTRACT_DRUG_CANDIDATE_RUN_v0.1.yaml
  - module_id: MOLECULAR_DOCKING_ADMISSION_BRIDGE
    status: INTEGRATED_NO_DOCKING_ASSETS
    origin: RG_MOLECULAR_DOCKING_ADMISSION_BRIDGE_v0.1.yaml
  - module_id: RG_UTW_SOURCE_SNAPSHOT
    status: EMBEDDED_VERBATIM_FOR_LINEAGE
    origin: READOUT_GENESIS_UNIVERSAL_TECHNICAL_WHITEPAPER_v1.2_EN.yaml.pseudo.dag(2).md
  - module_id: PYTHON_REFERENCE_RUNTIME
    status: EMBEDDED_AND_COMPILE_TESTED
    origin: rg_t2d_numeric_benchmark.py
  - module_id: OPEN_SCIENCE_TOOL_AND_ADAPTER_REGISTRY
    status: INTEGRATED
    origin: RG_OPEN_SCIENCE_STANDALONE_v3.0
  - module_id: GLOBAL_DRUG_FOOD_PATHWAY_WORKFLOW_DAGS
    status: INTEGRATED
    origin: RG_OPEN_SCIENCE_STANDALONE_v3.0
  execution_boundary:
    can_compute:
    - typed drug–food–lane matching
    - systems-level T2D simulation using frozen normalized matrices
    - positive and negative control checking
    - abstract food-portfolio optimization contract
    - abstract drug-candidate-family envelope
    - docking input admission and provenance checks
    cannot_create_from_root:
    - ligand atomic coordinates
    - receptor atomic coordinates
    - binding-site geometry
    - novel molecular graph
    - SMILES
    - synthesis route
    - human dose
integrated_modules:
  t2d_abstract_candidate_run:
    document:
      id: RG-T2D-ABSTRACT-CANDIDATE-RUN
      version: 0.1.0
      parent_compiler: RG_BIDIRECTIONAL_DRUG_FOOD_LANE_COMPILER_v1.0.yaml
      status: ABSTRACT_RESEARCH_CANDIDATE_ONLY
      clinical_validity: UNRESOLVED
      exact_molecule_design: FORBIDDEN_BY_PARENT_COMPILER
    ProblemCard:
      problem_id: T2D_MULTI_LANE_001
      disease_or_condition_label: type_2_diabetes
      question: Find an abstract intervention family that lowers glycaemic burden and body weight while minimizing hypoglycaemia
        and organ risk.
      population_context:
        species: human
        subpopulation: adults_with_type_2_diabetes
        renal_function: context_dependent
        hepatic_function: context_dependent
        co_medications: UNRESOLVED
      target_readouts:
      - reader_id: R_HBA1C
        variable: long_term_glycaemic_burden
        desired_direction_or_range: DECREASE
        time_window: months
      - reader_id: R_PPG
        variable: postprandial_glucose_excursion
        desired_direction_or_range: DECREASE
        time_window: hours
      - reader_id: R_WEIGHT
        variable: body_weight
        desired_direction_or_range: DECREASE_OR_NEUTRAL
        time_window: months
      - reader_id: R_HYPO
        variable: clinically_significant_hypoglycaemia
        desired_direction_or_range: MINIMIZE
        time_window: all
      - reader_id: R_CARDIORENAL
        variable: cardiorenal_risk
        desired_direction_or_range: NOT_WORSEN_AND_PREFER_IMPROVE
        time_window: years
      horizon: acute_to_multiyear
      allowed_interventions:
      - ABSTRACT_DRUG_CANDIDATE_FAMILY
      - COMBINATION_PRODUCT
      forbidden_information:
      - held_out_outcomes_during_model_construction
      - unproven_target_answers_as_root_inputs
      - exact_molecular_structure
      - SMILES
      - synthesis_route
      - human_dose
    LaneCards:
    - lane_id: L_INCRETIN_PANCREATIC
      status: EVIDENCE_BOUNDED
      desired_transitions:
      - glucose_dependent_insulin_signal_INCREASE
      - inappropriate_glucagon_signal_DECREASE
      compartments:
      - gut_endocrine_axis
      - pancreatic_islets
      - central_metabolic_networks
      reference_evidence:
      - PMID:34170647
      identifiability_status: PARTIAL
    - lane_id: L_APPETITE_NUTRIENT_DELIVERY
      status: EVIDENCE_BOUNDED
      desired_transitions:
      - energy_intake_signal_DECREASE
      - gastric_nutrient_delivery_MODERATE_DECREASE
      compartments:
      - gut
      - brain
      reference_evidence:
      - PMID:34170647
      identifiability_status: PARTIAL
    - lane_id: L_RENAL_GLUCOSE_REABSORPTION
      status: EVIDENCE_BOUNDED
      desired_transitions:
      - renal_glucose_reabsorption_MODERATE_DECREASE
      compartments:
      - kidney_proximal_tubule
      reference_evidence:
      - PMID:26378978
      identifiability_status: PARTIAL
    - lane_id: L_HEPATIC_GLUCOSE_SENSING
      status: EXCLUDED_FROM_PRIMARY_CANDIDATE
      desired_transitions:
      - hepatic_glucose_disposal_INCREASE
      exclusion_reason:
      - historical_glucokinase_activation_programs_showed_hypoglycaemia_or_lipid_and_durability_defects
      - requires_separate_hepatoselective_card_and_safety_calibration
      reference_evidence:
      - PMID:26434934
      - PMID:21994424
      - PMID:24858947
    DesignRequestCard:
      design_id: T2D_CANDIDATE_FAMILY_001
      problem_id: T2D_MULTI_LANE_001
      design_mode: ABSTRACT_DRUG_CANDIDATE_FAMILY
      desired_lane_signature:
      - lane_id: L_INCRETIN_PANCREATIC
        priority: PRIMARY
      - lane_id: L_APPETITE_NUTRIENT_DELIVERY
        priority: PRIMARY
      - lane_id: L_RENAL_GLUCOSE_REABSORPTION
        priority: SECONDARY
      allowed_modalities:
      - PEPTIDE_OR_PROTEIN_LIKE_BIOLOGIC
      - SMALL_MOLECULE
      - COMBINATION_PRODUCT
      safety_exclusions:
      - glucose_independent_insulin_release
      - severe_or_persistent_gastric_slowing
      - excessive_volume_depletion
      - ketoacidosis_signal
      - hepatic_lipid_accumulation
      - uncontrolled_polypharmacology
      evidence_floor: HUMAN_INTERVENTION_FOR_REFERENCE_LANES
    ModalityRouterResult:
      single_molecule_solution:
        status: UNRESOLVED_AND_NOT_PREFERRED
        reason:
        - incretin receptor agonism and renal transporter inhibition have different modality and exposure requirements
        - forcing both into one molecular entity increases uncertainty and off_target risk
      selected_architecture: TWO_ACTIVE_ENTITY_COMBINATION_PRODUCT
    AbstractCandidateFamily:
      candidate_id: BGLC_2M_001
      working_name: Balanced Glucose-Lane Controller, two-module
      active_entity_A:
        role: GLUCOSE_DEPENDENT_INCRETIN_CONTROLLER
        modality_family: long_acting_peptide_or_protein_like_biologic
        required_operator_features:
        - activate declared incretin receptor family only in calibrated exposure range
        - increase insulin signalling preferentially when glucose is elevated
        - reduce inappropriate glucagon signalling
        - produce appetite reduction without excessive gastric slowing
        - sustain exposure sufficiently for low_frequency administration
        molecular_feature_envelope:
        - receptor_readable binding surface
        - proteolytic_stability feature
        - exposure_extension feature
        - selectivity against unrelated receptor families
        exact_sequence_or_structure: UNRESOLVED_AND_NOT_OUTPUT
      active_entity_B:
        role: RENAL_GLUCOSE_REABSORPTION_CONTROLLER
        modality_family: kidney_exposed_small_molecule_transporter_inhibitor
        required_operator_features:
        - moderately reduce renal glucose reabsorption
        - retain transporter selectivity
        - avoid excessive systemic off_target activity
        - use exposure limits that reduce dehydration and ketoacidosis risk
        molecular_feature_envelope:
        - transporter_readable interaction pattern
        - renal_compartment exposure compatibility
        - metabolic stability within a bounded window
        - low interaction burden with the biologic module
        exact_structure: UNRESOLVED_AND_NOT_OUTPUT
      shared_product_requirements:
      - independent identity and potency assays for both entities
      - separate exposure models followed by joint lane propagation
      - interaction card for hypoglycaemia, gastrointestinal, renal and volume status
      - human evidence must test the frozen combination rather than summing separate trials
    FrameworkComputation:
      lane_operator_target: Lambda_star = {u_incretin(t), u_appetite(t), u_renal(t)}
      objective: min ||Lambda_star-lambda||_W + lambda_X D_exposure + lambda_R D_safety + lambda_U D_uncertainty
      qualitative_pareto_result:
      - candidate: ENTITY_A_ONLY
        coverage:
        - incretin
        - glucagon
        - appetite
        - gastric_delivery
        main_defect: renal_cardiorenal_lane_not_directly_covered
        status: ADMITTED_REFERENCE_FAMILY
      - candidate: ENTITY_B_ONLY
        coverage:
        - renal_glucose_reabsorption
        - cardiorenal_reference_outcomes
        main_defect: weight_and_incretin_lanes_not_directly_covered
        status: ADMITTED_REFERENCE_FAMILY
      - candidate: ENTITY_A_PLUS_ENTITY_B
        coverage:
        - incretin
        - glucagon
        - appetite
        - renal_glucose_reabsorption
        main_defect: joint_safety_and_incremental_benefit_UNRESOLVED
        status: SELECTED_ABSTRACT_CANDIDATE
      - candidate: ADD_HEPATIC_GLUCOKINASE_ACTIVATOR
        coverage:
        - hepatic_glucose_sensing
        main_defect: hypoglycaemia_lipid_and_durability_risk
        status: OBSTRUCTED_FOR_PRIMARY_DESIGN
    FoodBidirectionalBridge:
      role: calibration_and_supporting_operator_search_not_active_drug_equivalence
      candidate_food_operators:
      - operator_class: intestinal_carbohydrate_release_modulator
        example_reference: standardized_mulberry_DNJ_lane
        relation_to_candidate: supports_postprandial_input_lane_but_does_not_replace_entity_A_or_B
        status: PARTIAL_LANE_CONCORDANCE
      - operator_class: food_matrix_delivery_modulator
        example_reference: lower_glycaemic_rice_or_fibre_matrix
        relation_to_candidate: reduces input_flux_via_physical_matrix
        status: OUTCOME_OR_LANE_PARTIAL
    DefectVector:
      epsilon_dyn: UNRESOLVED_NO_FROZEN_NUMERIC_LANE_MODEL
      epsilon_read: UNRESOLVED_NO_SHARED_HELD_OUT_READERS
      epsilon_inv: UNRESOLVED
      epsilon_bridge: UNRESOLVED
      epsilon_cal: UNRESOLVED
      identifiability: PARTIAL
      safety: UNRESOLVED_FOR_COMBINATION
      clinical_equivalence: NOT_ADMITTED
    ClaimLedger:
      admitted:
      - The framework selects a two-active-entity abstract combination as a Pareto candidate.
      - The candidate requires one glucose-dependent incretin-control entity and one renal glucose-reabsorption-control
        entity.
      - Exact molecular identities cannot be derived without target-reader, exposure and held-out Lane Cards.
      cannot_claim:
      - that the candidate is safer or more effective than existing therapy
      - that the two entities should be administered together
      - that any exact molecule, dose or formulation has been discovered
      - that food components are therapeutic substitutes
      next_bottleneck:
      - freeze quantitative LaneCards
      - calibrate exposure-response models
      - test combination interactions
      - perform held-out human or translational validation
  molecular_docking_admission_bridge:
    document:
      id: RG-MDAB
      title: Readout Genesis Molecular Docking Admission Bridge
      version: 0.1.0
      status: SAFE_DOMAIN_ADAPTER_NO_DOCKING_ASSETS
      parent_root: RG-UTW-1.2.0
      parent_system: RG-BDFLC-1.1.0-safe-numeric
      purpose:
      - accept externally sourced receptor and ligand structures
      - validate geometry, typing, provenance, pocket definition and preparation lineage
      - compile docking-ready metadata only after all gates pass
      - return PASS, FAIL, OBSTRUCTED or UNRESOLVED without fabricating missing structures
      not_a_source_of:
      - receptor coordinates
      - ligand structures
      - binding-site coordinates
      - novel molecular graphs
      - SMILES
      - synthesis routes
      - human doses
    root_alignment:
      mandatory_order:
      - RETENTION
      - STRUCTURE
      - TRANSLATION
      - MEANING
      - REPORT
      root_derived:
      - typed_input_contract
      - reader_relative_equivalence
      - quotient_and_sufficiency_gate
      - commuting_square
      - defect_vector
      - calibration_freeze
      - maker_checker
      - bounded_claim
      external_domain_required:
      - protein structure
      - ligand structure
      - protonation model
      - force-field or atom typing
      - binding-site definition
      - docking engine score
      forbidden_claim: The RG root derives molecular geometry or a biologically correct receptor-ligand complex.
    admission_equations:
      typed_source: s_x = e_S(T_x; theta_S)
      geometry_translation: g_x = G(s_x; theta_G)
      pocket_reader: p = O_pocket(g_receptor, evidence)
      ligand_reader: l = O_ligand(g_ligand, preparation)
      admission: C_dock = 1 iff provenance, geometry, chemistry, pocket, preparation, context and controls all pass;
        0 if contradicted; bottom if missing
      defects:
        epsilon_geometry: bond/angle/clash/coordinate defect
        epsilon_typing: atom-type and charge assignment defect
        epsilon_pocket: binding-site definition uncertainty
        epsilon_preparation: missing atoms, residues, protonation, cofactors or waters
        epsilon_provenance: source and lineage incompleteness
        epsilon_cal: benchmark calibration defect
    schemas:
      ReceptorStructureCard:
        required:
        - source_id
        - structure_accession_or_local_hash
        - organism
        - chain_selection
        - experimental_or_predicted_status
        - resolution_or_confidence
        - cofactors_and_bound_ligands
        - missing_regions
        - provenance
        fields:
          coordinates: EXTERNAL_FILE_REFERENCE_ONLY
          binding_site: MUST_BE_EXTERNALLY_EVIDENCED_OR_UNRESOLVED
          protonation: EXTERNAL_METHOD_WITH_VERSION_AND_PARAMETERS
          prepared_structure_hash: REQUIRED_AFTER_PREPARATION
      LigandStructureCard:
        required:
        - source_id
        - identity
        - structure_accession_or_local_hash
        - stereochemistry
        - formal_charge
        - tautomer_or_protomer_policy
        - provenance
        fields:
          coordinates: EXTERNAL_FILE_REFERENCE_ONLY
          novel_structure_generation: DISABLED
          prepared_ligand_hash: REQUIRED_AFTER_PREPARATION
      PocketCard:
        required:
        - pocket_id
        - receptor_hash
        - definition_method
        - evidence
        - residue_set
        - uncertainty
        fields:
          center: EXTERNAL_MEASURED_OR_DECLARED
          extent: EXTERNAL_MEASURED_OR_DECLARED
          coordinates: NOT_GENERATED_BY_ROOT
      DockingRunCard:
        required:
        - run_id
        - engine
        - engine_version
        - receptor_hash
        - ligand_hash
        - pocket_hash
        - preparation_hashes
        - benchmark_split
        - controls
        - tolerances
        fields:
          engine: PyRx_or_AutoDock_Vina_or_declared_equivalent
          novel_candidate_generation: DISABLED
          output_claim: STRUCTURAL_HYPOTHESIS_ONLY
    pipeline:
    - stage: 01_IMPORT_EXTERNAL_STRUCTURES
      output: typed structure references
      failures:
      - MISSING_PROVENANCE
      - MISSING_HASH
      - UNRESOLVED
    - stage: 02_VALIDATE_RECEPTOR
      checks:
      - coordinate finiteness
      - chain identity
      - missing residues
      - cofactors
      - alternate locations
      - experimental resolution or prediction confidence
      failures:
      - GEOMETRY_INVALID
      - CONTEXT_MISMATCH
      - UNRESOLVED
    - stage: 03_VALIDATE_LIGAND
      checks:
      - atom valence
      - formal charge
      - stereochemistry
      - tautomer/protomer enumeration policy
      - coordinate finiteness
      failures:
      - CHEMISTRY_INVALID
      - IDENTITY_UNRESOLVED
    - stage: 04_PREPARATION
      checks:
      - hydrogen policy
      - protonation policy
      - atom typing
      - charge model
      - water/cofactor policy
      failures:
      - TYPING_FAILURE
      - PREPARATION_UNRESOLVED
    - stage: 05_POCKET_ADMISSION
      checks:
      - evidence for pocket
      - residue set
      - bound-ligand or mutational support
      - uncertainty
      failures:
      - POCKET_UNRESOLVED
      - TARGET_LEAKAGE
    - stage: 06_BENCHMARK_AND_CONTROLS
      controls:
        positive: known reference complex or known binder from external evidence
        negative: decoy or incompatible ligand expected not to reproduce reference pattern
      failures:
      - POSITIVE_CONTROL_FAILED
      - NEGATIVE_CONTROL_DID_NOT_FAIL
      - TRAIN_TEST_LEAKAGE
    - stage: 07_DOCKING_ADMISSION
      rule: Only emit a docking-input manifest when every required card and defect gate passes.
      output:
      - receptor_file_reference
      - ligand_file_reference
      - pocket_metadata_reference
      - preparation_hashes
      - engine_metadata
      - bounded_claim
    status_policy:
      PASS: all external inputs and gates passed
      FAIL: contradiction or hard geometry/chemistry/control failure
      OBSTRUCTED: safety or policy boundary blocks requested output
      UNRESOLVED: required empirical structure, pocket or calibration data missing
    bounded_claim:
      allowed:
      - the imported and prepared structures passed declared validation gates
      - the declared docking benchmark is reproducible under frozen inputs
      - a pose or score is a structural-computational hypothesis
      forbidden:
      - root-derived receptor geometry
      - root-derived ligand geometry
      - proof of binding
      - proof of efficacy
      - proof of safety
      - clinical dose or treatment recommendation
    blank_project:
      ReceptorStructureCard: POPULATE_FROM_EXTERNAL_STRUCTURE_SOURCE
      LigandStructureCard: POPULATE_FROM_EXTERNAL_STRUCTURE_SOURCE
      PocketCard: POPULATE_FROM_EXTERNAL_EVIDENCE
      DockingRunCard: FREEZE_BEFORE_EXECUTION
