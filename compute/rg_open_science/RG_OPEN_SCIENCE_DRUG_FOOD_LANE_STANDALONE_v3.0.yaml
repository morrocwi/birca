      15,521.714,525.122,528.584,523.936\n16,523.484,525.770,526.765,524.020\n17,524.490,526.098,524.749,524.455\n```\n\
      \n```pseudo\nFUNCTION ENCODE_RP4C(raw_rows, certificate):\n    REQUIRE SHA256(raw_rows) == declared_dataset_sha256\n\
      \    REQUIRE tape_index == consecutive_integers(0, 17)\n    REQUIRE no_missing_values(raw_rows[r0:r3])\n    REQUIRE\
      \ certificate_hash == declared_calibration_certificate_sha256\n\n    baseline = [500, 500, 500, 500]\n    gain\
      \ = [100, 100, 100, 100]\n\n    FOR each row n:\n        r_n = [r0, r1, r2, r3]\n        Phi_n = elementwise_divide(r_n\
      \ - baseline, gain)\n        APPEND Phi_n with raw-row lineage to Tape\n\n    RETURN Phi[0:17]\nEND\n```\n\n##\
      \ 24.3 Domain Calibration\n\nOnly \\(D\\) and \\(K\\) are fitted. The mass scale \\(M=1\\), tape interval \\(\\\
      Delta t=1\\), topology, decoder, split, solver, and tolerances are frozen before fitting.\n\nFor each training\
      \ equation index \\(n=1,\\ldots,9\\), define:\n\n\\[\ny_n=-M\\delta_t^2\\Phi_n,\n\\qquad\nX_n=\n\\begin{bmatrix}\n\
      \\delta_t^c\\Phi_n & L_{P_4}\\Phi_n\n\\end{bmatrix}.\n\\]\n\nAfter stacking all four components and all training\
      \ indices:\n\n\\[\n\\widehat\\theta\n=\n\\begin{bmatrix}\n\\widehat D\\\\\n\\widehat K\n\\end{bmatrix}\n=\n(X^\\\
      top X)^{-1}X^\\top y.\n\\]\n\n```yaml\nCalibrationProtocol:\n  split:\n    training_observations: [0, 10]\n   \
      \ training_equations: [1, 9]\n    held_out_observations: [11, 17]\n  fixed_before_fit:\n    - dataset_hash\n  \
      \  - calibration_certificate_hash\n    - split_indices\n    - M\n    - dt\n    - L_graph\n    - zero_source\n \
