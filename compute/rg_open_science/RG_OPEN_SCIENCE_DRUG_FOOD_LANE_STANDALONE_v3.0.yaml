integration_contract:
  source_to_lane: retained tape -> typed source -> exposure translation -> intervention operator -> lane propagation
    -> readers -> safety -> bounded claim
  lane_to_abstract_candidate: desired reader trajectory -> lane operator envelope -> modality family -> exposure and
    safety constraints -> abstract candidate family
  candidate_to_docking: abstract candidate family does not generate a ligand; an externally identified ligand and receptor
    must pass the docking admission bridge
  docking_to_claim: pose and score -> structural computational hypothesis only -> requires independent biochemical, cellular,
    exposure and human evidence
standalone_runner:
  filename: rg_standalone_runner.py
  sha256: 5de561d2c8bfe707fa59c82b687e06f9ba826f6f7e25e40e3261db1d3ef98e8f
  source: "#!/usr/bin/env python3\n\"\"\"\nRG standalone runner v2.0.\n\nSupported:\n  validate\n  checker\n  candidate\n\
    \  docking-template\n\nNot supported:\n  creating ligand/receptor coordinates, docking grids, molecules, synthesis,\
    \ or doses.\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport hashlib\nimport json\nfrom pathlib\
    \ import Path\nimport tempfile\n\nimport numpy as np\nimport yaml\n\n\ndef load(path: Path) -> dict:\n    with path.open(\"\
    r\", encoding=\"utf-8\") as f:\n        return yaml.safe_load(f)\n\n\ndef validate(doc: dict) -> dict:\n    failures\
    \ = []\n    for key in [\n        \"root_mathematical_contract\",\n        \"runtime_pipeline\",\n        \"numeric_domain_packages\"\
    ,\n        \"integrated_modules\",\n        \"embedded_source_snapshots\",\n        \"embedded_runtime\",\n     \
    \   \"docking_admission_blank_cards\",\n    ]:\n        if key not in doc:\n            failures.append(f\"missing:{key}\"\
    )\n\n    pkg = doc.get(\"numeric_domain_packages\", {}).get(\"T2D_SAFE_BENCHMARK\", {})\n    matrices = pkg.get(\"\
    lane_card_numeric\", {}).get(\"frozen_matrices\", {})\n    try:\n        A = np.asarray(matrices[\"A_lane\"], dtype=float)\n\
    \        B = np.asarray(matrices[\"B_lane\"], dtype=float)\n        C = np.asarray(matrices[\"C_lane\"], dtype=float)\n\
    \        D = np.asarray(matrices[\"D_lane\"], dtype=float)\n        if A.shape[0] != A.shape[1]:\n            failures.append(\"\
    A_lane_not_square\")\n        if B.shape[0] != A.shape[0]:\n            failures.append(\"B_lane_rows_mismatch\"\
    )\n        if C.shape[1] != A.shape[0]:\n            failures.append(\"C_lane_columns_mismatch\")\n        if D.shape\
    \ != (C.shape[0], B.shape[1]):\n            failures.append(\"D_lane_shape_mismatch\")\n        spectral_radius =\
    \ float(max(abs(np.linalg.eigvals(A))))\n    except Exception as exc:\n        failures.append(f\"matrix_validation:{exc}\"\
    )\n        spectral_radius = None\n\n    snap = doc.get(\"embedded_source_snapshots\", {}).get(\"RG_UTW_v1_2\", {})\n\
    \    if snap:\n        actual = hashlib.sha256(snap.get(\"content\", \"\").encode(\"utf-8\")).hexdigest()\n     \
    \   if actual != snap.get(\"sha256\"):\n            failures.append(\"root_snapshot_hash_mismatch\")\n\n    runtime\
    \ = doc.get(\"embedded_runtime\", {})\n    if runtime:\n        actual = hashlib.sha256(runtime.get(\"source\", \"\
    \").encode(\"utf-8\")).hexdigest()\n        if actual != runtime.get(\"sha256\"):\n            failures.append(\"\
    embedded_runtime_hash_mismatch\")\n        try:\n            compile(runtime.get(\"source\", \"\"), runtime.get(\"\
    source_filename\", \"<embedded>\"), \"exec\")\n        except Exception as exc:\n            failures.append(f\"\
    embedded_runtime_compile:{exc}\")\n\n    return {\n        \"status\": \"PASS\" if not failures else \"FAIL\",\n\
    \        \"failures\": failures,\n        \"spectral_radius\": spectral_radius,\n        \"clinical_validity\": \"\
    UNRESOLVED\",\n        \"molecular_geometry_generation\": \"NOT_DERIVABLE_FROM_ROOT\",\n    }\n\n\ndef run_embedded_checker(doc:\
    \ dict, standalone_path: Path) -> dict:\n    runtime = doc[\"embedded_runtime\"]\n    with tempfile.TemporaryDirectory()\
    \ as td:\n        script = Path(td) / runtime[\"source_filename\"]\n        script.write_text(runtime[\"source\"\
    ], encoding=\"utf-8\")\n        # Reuse the embedded package directly instead of shelling to a docking engine.\n\
    \        pkg = doc[\"numeric_domain_packages\"][\"T2D_SAFE_BENCHMARK\"]\n        checker = pkg[\"synthetic_calibration_bundle\"\
    ][\"held_out_checker\"]\n        return {\n            \"label\": \"[SimulatedData]\",\n            \"checker_status\"\
    : checker[\"checker_status\"],\n            \"positive_control\": checker[\"positive_control\"],\n            \"\
    negative_control\": checker[\"negative_control\"],\n            \"note\": \"Values are frozen synthetic software\
    \ checks, not human calibration.\",\n        }\n\n\ndef candidate_summary(doc: dict) -> dict:\n    run = doc[\"integrated_modules\"\
    ][\"t2d_abstract_candidate_run\"]\n    return {\n        \"document\": run.get(\"document\"),\n        \"problem\"\
    : run.get(\"ProblemCard\"),\n        \"lane_cards\": run.get(\"LaneCards\"),\n        \"design_request\": run.get(\"\
    DesignRequestCard\"),\n        \"candidate_output\": run.get(\"CandidateOutput\")\n            or run.get(\"DesignReport\"\
    )\n            or run.get(\"output\")\n            or \"Inspect integrated module for full candidate record.\",\n\
    \        \"boundary\": {\n            \"exact_molecule\": \"NOT_GENERATED\",\n            \"SMILES\": \"NOT_GENERATED\"\
    ,\n            \"synthesis\": \"NOT_GENERATED\",\n            \"clinical_validity\": \"UNRESOLVED\",\n        },\n\
    \    }\n\n\ndef docking_template(doc: dict) -> dict:\n    return {\n        \"status\": \"UNRESOLVED_UNTIL_EXTERNAL_STRUCTURES_ARE_PROVIDED\"\
    ,\n        \"cards\": doc[\"docking_admission_blank_cards\"],\n        \"admission_bridge\": doc[\"integrated_modules\"\
    ][\"molecular_docking_admission_bridge\"],\n    }\n\n\ndef main() -> None:\n    parser = argparse.ArgumentParser()\n\
    \    parser.add_argument(\"--yaml\", required=True)\n    parser.add_argument(\n        \"command\",\n        choices=[\"\
    validate\", \"checker\", \"candidate\", \"docking-template\"],\n    )\n    args = parser.parse_args()\n\n    path\
    \ = Path(args.yaml)\n    doc = load(path)\n    if args.command == \"validate\":\n        result = validate(doc)\n\
    \    elif args.command == \"checker\":\n        result = run_embedded_checker(doc, path)\n    elif args.command ==\
    \ \"candidate\":\n        result = candidate_summary(doc)\n    else:\n        result = docking_template(doc)\n\n\
    \    print(json.dumps(result, ensure_ascii=False, indent=2))\n\n\nif __name__ == \"__main__\":\n    main()\n"
open_science_governance:
  principles:
  - API and dataset inputs MUST retain source, retrieval time, query, response hash and license metadata.
  - Remote data MUST be cached before model fitting.
  - Training and held-out sets MUST be frozen by content hash.
  - User secrets and API keys MUST come from environment variables and MUST NOT be written into YAML.
  - Community-contributed food data MUST be marked lower-confidence until independently verified.
  - Association databases MUST NOT be treated as causal Lane Cards without translation and calibration.
  - Docking scores MUST NOT replace measured bioactivity, exposure, safety or human outcomes.
  network_policy:
    default: OFFLINE
    allowed_when:
    - adapter enabled explicitly
    - terms and license accepted
    - rate-limit policy configured
    - cache directory configured
    - request provenance enabled
    secret_policy: ENVIRONMENT_VARIABLES_ONLY
  license_gate:
    statuses:
    - OPEN_CONFIRMED
    - OPEN_WITH_ATTRIBUTION
    - OPEN_DATABASE_LICENSE
    - PUBLIC_DOMAIN_OR_CC0
    - ACADEMIC_ONLY_OR_RESTRICTED
    - VERIFY_BEFORE_USE
    commercial_use_rule: Commercial deployment MUST independently review the current license of every source.
