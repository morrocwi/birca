      \ REQUIRED\n\n  verification:\n    proof_or_derivation_artifact: REQUIRED_IF_DERIVED_OR_MACHINE_CHECKED\n    positive_control:\
      \ REQUIRED_IF_EVIDENTIARY\n    negative_control: REQUIRED_IF_EVIDENTIARY\n    checker_independent: REQUIRED_IF_HELD_OUT_OR_EMPIRICAL\n\
      \    defects: REQUIRED_IF_COMPUTED_OR_TRANSLATED\n\n  scope:\n    finite_or_continuum: REQUIRED\n    exact_or_toleranced:\
      \ REQUIRED\n    local_or_global: REQUIRED\n    domain_specific_or_universal: REQUIRED\n    context: REQUIRED\n\n\
      \  forbidden_upgrade:\n    text: REQUIRED\n```\n\n## 19.1 Legacy tier mapping\n\n```yaml\nLegacyTierMapping:\n\
      \  Ax: ROOT_AXIOM\n  Df: DEFINITION\n  Th_coqc: MACHINE_CHECKED_SCOPE\n  finite_diagnostic: FINITE_FIXTURE\n  Dr:\
      \ CONDITIONAL\n  Open: OPEN\n```\n\nA legacy `Th` without a proof artifact is not promoted automatically. Map it\
      \ to `CONDITIONAL` or `DERIVED_EXACT` according to the derivation actually verified.\n\n---\n\n# 20. Mandatory\
      \ Human–AI Run Report\n\n```yaml\nDomainRunReport:\n  document_version: REQUIRED\n  root_hash: REQUIRED\n  domain_card_hash:\
