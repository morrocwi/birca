    Prefect:
      role:
      - workflow_orchestration_optional
      python_import: prefect
      profile: full
    MLflow:
      role:
      - experiment_tracking_optional
      python_import: mlflow
      profile: full
    DVC:
      role:
      - dataset_versioning_optional
      command: dvc
      profile: full
  remote_sources:
    RCSB_PDB:
      domain: structure
      transport:
      - REST
      - GraphQL
      - bulk_download
      base_endpoints:
      - https://data.rcsb.org/rest/v1/core
      - https://data.rcsb.org/graphql
      auth: none_for_standard_reads
      adapter_mode: API_AND_BULK
      provides:
      - experimental_structure_metadata
      - chains
      - experimental_method
      - resolution
      - bound_components
      does_not_provide:
      - proof_of_target_relevance
      - human_exposure
      license_status: OPEN_CONFIRMED
    UniProt:
      domain: protein_identity_and_function
      transport:
      - REST
      - bulk_download
      base_endpoints:
      - https://rest.uniprot.org
      auth: none_for_standard_reads
      adapter_mode: API_AND_BULK
      provides:
      - protein_identity
      - sequence
      - annotations
      - cross_references
      license_status: VERIFY_BEFORE_USE
    AlphaFold_DB:
      domain: predicted_structure
      transport:
      - API_OR_DOWNLOAD
      base_endpoints:
      - https://alphafold.ebi.ac.uk/api
      auth: none_for_standard_reads
      adapter_mode: OPTIONAL_CONFIDENCE_GATED
      provides:
      - predicted_structures
      - confidence_metadata
      experimental_status: PREDICTED_NOT_EXPERIMENTAL
      license_status: VERIFY_BEFORE_USE
    PubChem:
      domain: chemical_identity_properties_and_assays
      transport:
      - PUG_REST
      - PUG_VIEW
      - bulk_download
      base_endpoints:
      - https://pubchem.ncbi.nlm.nih.gov/rest/pug
      - https://pubchem.ncbi.nlm.nih.gov/rest/pug_view
      auth: none
      rate_policy:
        maximum_requests_per_second: 5
        bulk_preferred_for_large_queries: true
      provides:
      - chemical_identifiers
      - properties
      - cross_references
      - bioassay_records
      license_status: PUBLIC_SOURCE_VERIFY_RECORD_PROVENANCE
    ChEMBL:
      domain: curated_bioactivity
      transport:
      - REST
      - Python_client
      - bulk_download
      base_endpoints:
      - https://www.ebi.ac.uk/chembl/api/data
      auth: none_for_standard_reads
      provides:
      - molecules
      - targets
      - assays
      - activities
      - drug_mechanisms
      license_status: OPEN_WITH_ATTRIBUTION
    BindingDB:
      domain: measured_binding
      transport:
      - bulk_or_declared_adapter
      base_endpoints: []
      endpoint_status: VERIFY_AT_RUNTIME
      provides:
      - measured_binding_records
      license_status: VERIFY_BEFORE_USE
    UniChem:
      domain: chemical_identifier_mapping
      transport:
      - REST_OR_BULK
      base_endpoints: []
      endpoint_status: VERIFY_AT_RUNTIME
      provides:
      - cross_database_structure_mappings
      license_status: VERIFY_BEFORE_USE
    OpenTargets:
      domain: target_disease_drug_evidence
      transport:
      - GraphQL
      - Parquet_download
      - MCP_optional
      base_endpoints:
      - https://api.platform.opentargets.org/api/v4/graphql
      - https://mcp.platform.opentargets.org/mcp
      auth: none_for_standard_reads
      provides:
      - target_disease_associations
      - drug_mechanisms
      - tractability
      - genetic_and_other_evidence
      license_status: OPEN_CONFIRMED
      causal_warning: association_evidence_requires_lane_translation_and_calibration
    Reactome:
      domain: curated_pathways
      transport:
      - REST
      - bulk_download
      base_endpoints:
      - https://reactome.org/ContentService
      auth: none_for_standard_reads
      provides:
      - pathways
      - reactions
      - participants
      - compartments
      license_status: OPEN_WITH_ATTRIBUTION
      lane_warning: pathway_is_not_numeric_LaneCard_by_itself
    WikiPathways:
      domain: community_pathways
      transport:
      - API_OR_DOWNLOAD
      base_endpoints: []
      endpoint_status: VERIFY_AT_RUNTIME
      provides:
      - pathway_graphs
      - annotations
      license_status: OPEN_WITH_ATTRIBUTION
    STRING:
      domain: protein_association_network
      transport:
      - REST_OR_DOWNLOAD
      base_endpoints: []
      endpoint_status: VERIFY_AT_RUNTIME
      provides:
      - protein_associations
      - evidence_channels
      license_status: VERIFY_BEFORE_USE
      causal_warning: association_edges_are_not_lane_dynamics
    OLS:
      domain: biomedical_ontologies
      transport:
      - REST
      base_endpoints: []
      endpoint_status: VERIFY_AT_RUNTIME
      provides:
      - ontology_terms
      - synonyms
      - hierarchies
      license_status: PER_ONTOLOGY_VERIFY
    FoodOn:
      domain: food_ontology
      transport:
      - ontology_download
      base_endpoints: []
      endpoint_status: VERIFY_AT_RUNTIME
      provides:
      - food_identity
      - ingredients
      - processing_terms
      license_status: OPEN_WITH_ATTRIBUTION
    USDA_FoodData_Central:
      domain: quantitative_food_composition
      transport:
      - REST
      - bulk_download
      base_endpoints:
      - https://api.nal.usda.gov/fdc/v1
      auth:
        type: API_KEY
        environment_variable: FDC_API_KEY
        must_not_be_committed: true
      provides:
      - food_search
      - food_details
      - nutrient_composition
      license_status: PUBLIC_DOMAIN_OR_CC0
    OpenFoodFacts:
      domain: packaged_foods
      transport:
      - REST
      - bulk_download
      base_endpoints:
      - https://world.openfoodfacts.org/api/v3
      - https://world.openfoodfacts.org/api/v2
      auth: none_for_read_operations
      provides:
      - barcode_products
      - ingredients
      - allergens
      - nutrition_labels
      data_quality: COMMUNITY_CONTRIBUTED_REQUIRES_VERIFICATION
      license_status: OPEN_DATABASE_LICENSE
      version_policy:
        v3: preferred_for_new_read_integrations
        v2: may_be_needed_for_structured_search
    ThaiFoodComposition:
      domain: Thai_food_composition
      transport:
      - manual_import_or_declared_dataset_adapter
      base_endpoints: []
      endpoint_status: NO_PUBLIC_API_ASSUMED
      provides:
      - Thai_food_identity
      - macro_and_micro_nutrients
      license_status: VERIFY_BEFORE_USE
    FAO_INFOODS:
      domain: international_food_composition_standards_and_datasets
      transport:
      - manual_or_bulk_dataset_import
      base_endpoints: []
      provides:
      - food_composition_standards
      - international_datasets
      license_status: PER_DATASET_VERIFY
    openFDA:
      domain: regulatory_labels_and_safety_signals
      transport:
      - REST
      base_endpoints:
      - https://api.fda.gov
      auth: optional_API_key_for_higher_limits
      provides:
      - drug_labels
      - product_records
      - adverse_event_reports
      causality_warning: spontaneous_reports_do_not_prove_causality
      license_status: PUBLIC_SOURCE_VERIFY_TERMS
adapter_contract:
  required_request_fields:
  - adapter_id
  - query_or_resource_id
  - retrieval_time_utc
  - software_version
  - request_parameters
  - accepted_license_status
  required_response_fields:
  - HTTP_status_or_import_status
  - raw_content_hash
  - normalized_record_hash
  - cache_path
  - schema_version
  - provenance
  - warnings
  retry_policy:
    maximum_attempts: 4
    exponential_backoff: true
    retry_statuses:
    - 429
    - 500
    - 502
    - 503
    - 504
    must_respect_retry_after: true
  cache_policy:
    content_addressed: true
    immutable_raw_cache: true
    normalized_cache: true
    offline_replay_required: true
  normalization_rules:
  - Identifiers MUST be namespace-qualified.
  - Units MUST be converted only through declared unit maps.
  - Missing values MUST remain UNRESOLVED, not zero.
  - Source-specific confidence and evidence fields MUST be retained.
  - Mappings MUST record method, version and ambiguity.
identifier_namespaces:
  chemical:
  - PubChem_CID
  - ChEBI_ID
  - ChEMBL_ID
  - InChIKey
  - PDB_CCD
  protein:
  - UniProtKB
  - Ensembl
  - NCBI_Gene
  - PDB_chain
  disease:
  - EFO
  - MONDO
  - ICD_WHEN_LICENSED
  - MeSH
  pathway:
  - Reactome_ID
  - WikiPathways_ID
  food:
  - FoodOn_ID
  - FDC_ID
  - OFF_barcode
  - ThaiFCD_local_ID
  drug_product:
  - openFDA_SET_ID
  - regulatory_product_ID
workflow_dags:
  disease_to_lane:
    purpose: Compile a disease question into candidate nodes and a calibratable Lane Card.
    stages:
    - id: D1
      uses:
      - OpenTargets
      - OLS
      output: disease_target_evidence
    - id: D2
      uses:
      - UniProt
      output: typed_protein_entities
    - id: D3
      uses:
      - Reactome
      - WikiPathways
      - STRING
      output: candidate_pathway_graph
    - id: D4
      uses:
      - NetworkX
      - RDFLib
      output: typed_compartmental_graph
    - id: D5
      uses:
      - RG_LaneCard_compiler
      output: draft_LaneCard
      gate: pathway_graph_must_not_be_called_numeric_lane_without_calibration
    - id: D6
      uses:
      - retained_experimental_data
      output: frozen_numeric_LaneCard_or_UNRESOLVED
  drug_to_lane:
    purpose: Translate existing drug evidence into lane operators.
    stages:
    - id: DR1
      uses:
      - PubChem
      - ChEMBL
      - UniChem
      output: chemical_identity
    - id: DR2
      uses:
      - ChEMBL
      - BindingDB
      output: measured_target_activity
    - id: DR3
      uses:
      - openFDA
      output: regulatory_and_safety_records
    - id: DR4
      uses:
      - ExposureCard_import
      output: exposure_state
    - id: DR5
      uses:
      - RG_operator_compiler
      output: drug_lane_operator
  food_to_lane:
    purpose: Translate food, nutrients and food matrices into bounded lane operators.
    stages:
    - id: F1
      uses:
      - FoodOn
      - USDA_FoodData_Central
      - ThaiFoodComposition
      - OpenFoodFacts
      output: typed_food_identity_and_composition
    - id: F2
      uses:
      - PubChem
      - ChEBI_mapping
      - literature_or_lab_assays
      output: component_and_matrix_operators
    - id: F3
      uses:
      - processing_and_batch_records
      output: food_matrix_and_processing_state
    - id: F4
      uses:
      - ExposureCard_import
      output: food_active_species_exposure_or_UNRESOLVED
    - id: F5
      uses:
      - RG_operator_compiler
      output: food_lane_operator
  structure_admission:
    purpose: Admit externally supplied structures for reproducible structural analysis.
    stages:
    - id: S1
      uses:
      - RCSB_PDB
      - UniProt
      output: receptor_structure_card
    - id: S2
      uses:
      - PubChem
      - ChEMBL
      - externally_supplied_ligand
      output: ligand_structure_card
    - id: S3
      uses:
      - Biopython
      - RDKit
      - MDAnalysis
      output: geometry_and_identity_validation
    - id: S4
      uses:
      - Meeko
      - OpenBabel_optional
      output: prepared_structure_hashes
    - id: S5
      uses:
      - RG_docking_admission_bridge
      output: PASS_FAIL_OR_UNRESOLVED
    - id: S6
      uses:
      - AutoDockVina_optional
      output: structural_hypothesis_only
      default: DISABLED
    - id: S7
      uses:
      - MDAnalysis
      output: RMSD_and_contact_checks
  integrated_drug_food_lane_research:
    purpose: End-to-end bounded research workflow.
    stages:
    - disease_to_lane
    - drug_to_lane
    - food_to_lane
    - drug_food_reader_match
    - systems_lane_propagation
    - safety_and_interaction_gate
    - maker_checker
    - bounded_report
  abstract_candidate_family:
    purpose: Generate only an abstract intervention envelope.
    stages:
    - desired_lane_signature
    - entry_node_and_direction_selection
    - modality_family_routing
    - exposure_envelope
    - safety_exclusions
    - evidence_plan
    forbidden:
    - novel_molecular_structure
    - SMILES
    - binding_site_coordinates
    - synthesis
    - dose
data_quality_tiers:
  structure:
  - EXPERIMENTAL_HIGH_CONFIDENCE
  - EXPERIMENTAL_LIMITED_OR_INCOMPLETE
  - PREDICTED_HIGH_CONFIDENCE
  - PREDICTED_LOW_CONFIDENCE
  - UNRESOLVED
  bioactivity:
  - DIRECT_QUANTITATIVE_ASSAY
  - DIRECT_QUALITATIVE_ASSAY
  - CELLULAR_PHENOTYPE
  - COMPUTATIONAL_ONLY
  - UNRESOLVED
  food_composition:
  - LAB_MEASURED_BATCH_SPECIFIC
  - CURATED_REFERENCE_FOOD
  - LABEL_REPORTED
  - COMMUNITY_CONTRIBUTED
  - UNRESOLVED
  lane_evidence:
  - HELD_OUT_HUMAN_INTERVENTION
  - HUMAN_INTERVENTION
  - OBSERVATIONAL_HUMAN
  - ANIMAL
  - CELL_OR_BIOCHEMICAL
  - COMPUTATIONAL
  - UNRESOLVED
workflow_run_manifest_schema:
  run_id: REQUIRED
  workflow_id: REQUIRED
  standalone_version: 3.0.0
  enabled_adapters:
  - REQUIRED
  dependency_profile: core_or_chemistry_or_full
  network_enabled: false
  cache_root: REQUIRED
  environment_variable_names_only:
  - OPTIONAL
  frozen_queries:
  - REQUIRED_IF_NETWORK
  input_hashes:
  - REQUIRED
  held_out_commitment_hash: REQUIRED_FOR_PREDICTIVE_CLAIMS
  license_acceptance_records:
  - REQUIRED_PER_SOURCE
  outputs:
  - REQUIRED
  defects:
  - REQUIRED
  claim_boundary: REQUIRED
embedded_open_science_runner:
  filename: rg_open_science_runner.py
  sha256: 9aac2ff7c6051c9abd85d9c9387c2e561426876b0abcd50ed59b6615ff00c405
  source: "#!/usr/bin/env python3\n\"\"\"RG Open-Science Standalone runner v3.0.\n\nThis runner validates and plans workflows.\
    \ Network calls and molecular generation\nare disabled by default. It does not create molecules, structures, docking\
    \ grids,\nsynthesis routes, doses, or clinical recommendations.\n\"\"\"\nfrom __future__ import annotations\n\nimport\
    \ argparse\nimport importlib.util\nimport json\nfrom pathlib import Path\nimport sys\n\nimport yaml\n\n\ndef load(path:\
    \ Path) -> dict:\n    with path.open(\"r\", encoding=\"utf-8\") as f:\n        return yaml.safe_load(f)\n\n\ndef\
    \ validate(doc: dict) -> dict:\n    required = [\n        \"root_mathematical_contract\",\n        \"runtime_pipeline\"\
    ,\n        \"tool_registry\",\n        \"dependency_profiles\",\n        \"adapter_contract\",\n        \"workflow_dags\"\
    ,\n        \"open_science_governance\",\n    ]\n    missing = [k for k in required if k not in doc]\n    return {\n\
    \        \"status\": \"PASS\" if not missing else \"FAIL\",\n        \"missing\": missing,\n        \"version\":\
    \ doc.get(\"document\", {}).get(\"version\"),\n        \"network_default\": doc.get(\"document\", {}).get(\"network_execution_default\"\
    ),\n        \"molecular_generation\": doc.get(\"document\", {}).get(\"molecular_generation\"),\n    }\n\n\ndef dependency_check(doc:\
    \ dict, profile: str) -> dict:\n    registry = doc[\"tool_registry\"][\"local_libraries\"]\n    statuses = []\n \
    \   selected = {\"core\"}\n    if profile == \"chemistry\":\n        selected.add(\"chemistry\")\n    elif profile\
    \ == \"full\":\n        selected.update({\"chemistry\", \"full\"})\n\n    for name, card in registry.items():\n \
    \       if card.get(\"profile\") not in selected:\n            continue\n        import_name = card.get(\"python_import\"\
    )\n        if import_name:\n            found = importlib.util.find_spec(import_name) is not None\n            statuses.append({\"\
    tool\": name, \"import\": import_name, \"installed\": found})\n        else:\n            statuses.append({\n   \
    \             \"tool\": name,\n                \"installed\": None,\n                \"note\": \"system or command\
    \ dependency; check separately\",\n            })\n    return {\"profile\": profile, \"dependencies\": statuses}\n\
    \n\ndef list_tools(doc: dict, kind: str) -> dict:\n    return {\n        \"kind\": kind,\n        \"tools\": doc[\"\
    tool_registry\"][\"local_libraries\" if kind == \"local\" else \"remote_sources\"],\n    }\n\n\ndef workflow_plan(doc:\
    \ dict, workflow: str) -> dict:\n    dags = doc[\"workflow_dags\"]\n    if workflow not in dags:\n        raise KeyError(f\"\
    Unknown workflow: {workflow}\")\n    return {\n        \"workflow\": workflow,\n        \"plan\": dags[workflow],\n\
    \        \"network_execution\": \"DISABLED_BY_DEFAULT\",\n        \"claim_boundary\": (\n            \"Plans and\
    \ systems-level hypotheses only; no novel molecule, synthesis, dose, \"\n            \"or therapeutic substitution.\"\
    \n        ),\n    }\n\n\ndef adapter_template(doc: dict, adapter: str) -> dict:\n    sources = doc[\"tool_registry\"\
    ][\"remote_sources\"]\n    if adapter not in sources:\n        raise KeyError(f\"Unknown adapter: {adapter}\")\n\
    \    return {\n        \"adapter\": adapter,\n        \"source_card\": sources[adapter],\n        \"request_contract\"\
    : doc[\"adapter_contract\"],\n        \"runtime_values\": {\n            \"query_or_resource_id\": \"POPULATE\",\n\
    \            \"retrieval_time_utc\": \"POPULATE\",\n            \"accepted_license_status\": \"POPULATE\",\n    \
    \        \"cache_root\": \"POPULATE\",\n            \"network_enabled\": False,\n        },\n    }\n\n\ndef requirements(doc:\
    \ dict, profile: str) -> dict:\n    card = doc[\"dependency_profiles\"][profile]\n    return {\n        \"profile\"\
    : profile,\n        \"packages\": card.get(\"packages\", []),\n        \"system_packages_optional\": card.get(\"\
    system_packages_optional\", []),\n    }\n\n\ndef main() -> None:\n    parser = argparse.ArgumentParser()\n    parser.add_argument(\"\
    --yaml\", required=True)\n    sub = parser.add_subparsers(dest=\"command\", required=True)\n\n    sub.add_parser(\"\
    validate\")\n\n    p_dep = sub.add_parser(\"dependency-check\")\n    p_dep.add_argument(\"--profile\", choices=[\"\
    core\", \"chemistry\", \"full\"], default=\"core\")\n\n    p_tools = sub.add_parser(\"list-tools\")\n    p_tools.add_argument(\"\
    --kind\", choices=[\"local\", \"remote\"], default=\"local\")\n\n    p_wf = sub.add_parser(\"workflow-plan\")\n \
    \   p_wf.add_argument(\"--workflow\", required=True)\n\n    p_ad = sub.add_parser(\"adapter-template\")\n    p_ad.add_argument(\"\
    --adapter\", required=True)\n\n    p_req = sub.add_parser(\"requirements\")\n    p_req.add_argument(\"--profile\"\
    , choices=[\"core\", \"chemistry\", \"full\"], default=\"core\")\n\n    args = parser.parse_args()\n    doc = load(Path(args.yaml))\n\
    \n    if args.command == \"validate\":\n        result = validate(doc)\n    elif args.command == \"dependency-check\"\
    :\n        result = dependency_check(doc, args.profile)\n    elif args.command == \"list-tools\":\n        result\
    \ = list_tools(doc, args.kind)\n    elif args.command == \"workflow-plan\":\n        result = workflow_plan(doc,\
    \ args.workflow)\n    elif args.command == \"adapter-template\":\n        result = adapter_template(doc, args.adapter)\n\
    \    else:\n        result = requirements(doc, args.profile)\n\n    print(json.dumps(result, ensure_ascii=False,\
    \ indent=2))\n\n\nif __name__ == \"__main__\":\n    main()\n"
