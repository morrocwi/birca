document:
  id: RG-OPEN-SCIENCE-DFL-STANDALONE
  title: Readout Genesis Open-Science Drug–Food–Lane Standalone with Global Data Adapters and Reproducible Workflow DAGs
  version: 3.0.0
  language:
    machine_keys: English
    human_notes: Thai_and_English
    mathematics: LaTeX_strings
  format: standalone_YAML_executable_specification
  release_status: INTEGRATED_OPEN_SCIENCE_SYSTEMS_RESEARCH_PACKAGE
  standalone: true
  parent_architecture:
    id: RG-UTW
    version: 1.2.0
    role: normative_root_and_verification_contract
  parent_drug_schema:
    id: RG-UHDIA
    version: 2.0.0
    role: typed_human_drug_information_pipeline
  parent_modality_registry:
    id: RG-DRUG-MODALITY-REGISTRY
    version: 2.0.0
    role: intervention_representation_router
  purpose:
  - compile a disease question into declared biological lanes
  - translate drugs, foods, nutrients and natural-product mixtures into lane-control operators
  - compare drug–food concordance without claiming interchangeability
  - design evidence-bounded food portfolios at abstract research level
  - design abstract drug-candidate families from desired lane transitions
  - return named defects and PASS, FAIL, OBSTRUCTED or UNRESOLVED without guessing
  execution_note: YAML is a machine-readable executable specification and data contract. It requires an interpreter implementing
    the declared algorithms; it is not a self-executing program.
  single_file_mode: true
  clinical_validity: UNRESOLVED
  molecular_geometry_generation: NOT_DERIVABLE_FROM_ROOT
  network_execution_default: DISABLED
  molecular_generation: DISABLED
  docking_execution: ADMISSION_ONLY_UNTIL_EXTERNAL_STRUCTURES_PASS
scope_and_safety_boundary:
  allowed:
  - research architecture
  - existing-drug comparison
  - food and nutrient concordance analysis
  - natural-product mixture analysis
  - drug repurposing hypothesis generation
  - abstract candidate-family and intervention-envelope generation
  - preclinical and clinical evidence planning
  forbidden_outputs:
  - individual dosing or self-medication instructions
  - instructions to replace prescribed treatment with food or herbs
  - exact novel drug molecule generation
  - SMILES, synthesis routes, reaction conditions or manufacturing recipes
  - clinical claims unsupported by held-out human evidence
  - claims that food–drug lane concordance implies therapeutic equivalence
  - docking-ready ligand or receptor files
  - binding-site coordinates or grid definitions
  - molecular-target optimization parameters
  - direct generation of novel molecular structures
  - target-specific docking grids or binding-site coordinates generated without external evidence
  - automated synthesis planning
  mandatory_warning: Outputs are research hypotheses. Clinical decisions require qualified medical and regulatory review.
normative_keywords:
  MUST: required for compliant execution
  MUST_NOT: forbidden; violation is DRIFT or INVALID
  SHOULD: recommended; omission requires a recorded reason
  MAY: permitted when claim scope is unchanged
conformance_levels:
  NORMATIVE: copied or faithfully specialized from RG-UTW root contracts
  DOMAIN_DECLARED: new drug–food–disease semantics that require a frozen Domain Card
  REFERENCE: deterministic default algorithm replaceable by a declared equivalent
  OPTIONAL: activated only by the Run Card
source_lineage:
  root_files:
  - name: READOUT_GENESIS_UNIVERSAL_TECHNICAL_WHITEPAPER_v1.2_EN.yaml.pseudo.dag.md
    id: RG-UTW-1.2.0
    load_bearing_contracts:
    - retention_to_structure_to_translation_to_meaning_to_report
    - reader_relative_equivalence
    - minimal_sufficient_dynamically_closed_domain
    - dynamic_commutation
    - readout_and_invariant_factorization
    - named_defects
    - three_valued_admissibility
    - calibration_freeze
    - maker_checker_with_positive_and_negative_controls
    - bounded_claim
  - name: RG_UNIVERSAL_HUMAN_DRUG_INFORMATION_ARCHITECTURE_v2.0.yaml
    id: RG-UHDIA-2.0.0
    load_bearing_contracts:
    - identity_to_representation_to_transformation_to_exposure
    - target_or_physical_action
    - biological_lane
    - cell_tissue_organ_translation
    - human_readout
    - safety
    - context_indexed_effect
    - unknown_is_not_zero
    - multi_mechanism_default
  - name: RG_DRUG_MODALITY_REGISTRY_v2.0.yaml
    id: RG-DRUG-MODALITY-REGISTRY-2.0.0
    load_bearing_contracts:
    - typed_modality_routing
    - natural_product_extract_mixture_representation
    - combination_product_representation
  domain_extension_declaration: All disease, drug, food, target, pathway, tissue and therapeutic labels below are DOMAIN_DECLARED,
    not root primitives and not uniquely derivable from information values alone.
information_philosophy_governance:
  mandatory_order:
  - RETENTION
  - STRUCTURE
  - TRANSLATION
  - MEANING
  - REPORT
  rules:
    no_built_in_domain_labels: true
    difference_before_entity: true
    history_before_container_time: true
    meaning_after_readout: true
    translation_must_account_for_loss: true
    claim_cannot_borrow_certainty: true
    report_is_last: true
    unknown_is_not_zero: true
    multi_mechanism_default: true
    context_indexed_effect: true
  forbidden_order:
  - start from disease name and import a final mechanism as root truth
  - insert desired answer as a coefficient or score target
  - use held-out outcomes to construct the model
  - attach therapeutic meaning before calibration
root_mathematical_contract:
  reader_equivalence:
    level: NORMATIVE
    equation_local: x \sim_{\mathcal O_D} y \iff O_\alpha(x)=O_\alpha(y)\ \forall\alpha\in\mathscr R_D
    equation_interventional: q_D(z)=q_D(z') \Rightarrow O_{D,n:n+H}(z,u)=O_{D,n:n+H}(z',u)\ \forall u\in\mathcal U_D
    interpretation: Equivalence is relative to the declared reader family, context, horizon and interventions; it is
      never absolute identity.
  domain_quotient:
    level: NORMATIVE
    equation: \mathcal D_D=\mathfrak Z_D/\!\sim_D
    required_properties:
    - state_sufficiency
    - readout_factorization
    - dynamic_commutation
    - invariant_preservation
    - declared_context
    - lineage_preservation
  commuting_square:
    level: NORMATIVE
    dynamic_equation: q_{D,n+1}\circ F_n=F^\sharp_{D,n}\circ q_{D,n}
    readout_equation: O_{D,n}=O^\sharp_{D,n}\circ q_{D,n}
    invariant_equation: \mathrm{Inv}_{D,n}=\mathrm{Inv}^\sharp_{D,n}\circ q_{D,n}
  defects:
    level: NORMATIVE
    epsilon_dyn: \epsilon_{\mathrm{dyn}}=\|q_{n+1}F_n-F^\sharp_nq_n\|
    epsilon_read: \epsilon_{\mathrm{read}}=\|O_n-O^\sharp_nq_n\|
    epsilon_inv: \epsilon_{\mathrm{inv}}=\|\mathrm{Inv}_n-\mathrm{Inv}^\sharp_nq_n\|
    requirements:
    - norm declared per defect
    - absolute and relative tolerances frozen before checking
    - comparison rule declared
    - missing norm or tolerance returns UNRESOLVED
  three_valued_admissibility:
    level: NORMATIVE
    equation: \mathcal C(\xi\mid c,\mathcal T)\in\{1,0,\bot\}
    mapping:
      '1': ADMITTED
      '0': OBSTRUCTED
      bottom: UNRESOLVED
status_enums:
  execution_status:
  - PASS_EXACT
  - PASS_TOLERANCED
  - FAIL
  - OBSTRUCTED
  - UNRESOLVED
  - DRIFT
  - INVALID
  claim_status:
  - NO_CLAIM
  - STRUCTURAL_ONLY
  - MECHANISTIC_HYPOTHESIS
  - PRECLINICAL_BOUNDED
  - HUMAN_ASSOCIATION_BOUNDED
  - HUMAN_INTERVENTION_BOUNDED
  - CLINICAL_NOT_ADMITTED
  match_status:
  - NO_MATCH
  - OUTCOME_ONLY
  - LANE_PARTIAL
  - LANE_MATCH
  - NODE_MATCH
  - OPERATOR_MATCH
  - FULL_FUNCTIONAL_EQUIVALENCE_UNRESOLVED
  evidence_tier:
  - COMPUTATIONAL
  - IN_VITRO
  - EX_VIVO
  - ANIMAL
  - OBSERVATIONAL_HUMAN
  - HUMAN_INTERVENTION
  - SYSTEMATIC_REVIEW
  - REGULATORY_LABEL
type_system:
  Scalar: finite numeric value with unit and uncertainty
  Interval:
    lower: Scalar
    upper: Scalar
  TimeSeries:
    time: ordered list[Scalar]
    value: list[Scalar or vector]
    unit: string
  Matrix:
    values: rectangular list[list[number]]
    row_labels: list[string]
    column_labels: list[string]
    unit: string_or_dimensionless
  Provenance:
    source_id: string
    source_type: dataset_or_publication_or_registry_or_experiment
    producer: string
    acquisition_protocol: string
    acquisition_time: ISO_8601
    content_hash: SHA256_or_UNRESOLVED
    license_or_access: string
schemas:
  ProblemCard:
    required:
    - problem_id
    - disease_or_condition_label
    - question
    - population_context
    - target_readouts
    - horizon
    - allowed_interventions
    - forbidden_information
    - tolerances
    template:
      problem_id: REQUIRED
      disease_or_condition_label: DOMAIN_DECLARED
      question: REQUIRED
      population_context:
        species: human_or_declared
        age_range: OPTIONAL
        sex: OPTIONAL
        organ_function: OPTIONAL
        genotype: OPTIONAL
        microbiome: OPTIONAL
        co_medications: OPTIONAL
        other_context: OPTIONAL
      target_readouts:
      - reader_id: REQUIRED
        variable: REQUIRED
        desired_direction_or_range: REQUIRED
        unit: REQUIRED
        time_window: REQUIRED
        priority_weight: OPTIONAL_FROZEN
      horizon: REQUIRED
      allowed_interventions:
      - EXISTING_DRUG
      - FOOD
      - NUTRIENT
      - NATURAL_PRODUCT_EXTRACT_MIXTURE
      - ABSTRACT_DRUG_CANDIDATE_FAMILY
      forbidden_information:
      - held_out_outcomes_during_model_construction
      - unproven_target_answers_as_root_inputs
      tolerances:
        epsilon_dyn_max: REQUIRED
        epsilon_read_max: REQUIRED
        epsilon_inv_max: REQUIRED
        epsilon_bridge_max: REQUIRED
        epsilon_cal_max: REQUIRED
        match_distance_max: REQUIRED
  LaneCard:
    required:
    - lane_id
    - version
    - question_scope
    - context
    - state_variables
    - inputs
    - dynamics
    - reader_family
    - invariants
    - quotient
    - calibration
    - evidence
    template:
      lane_id: REQUIRED
      version: REQUIRED
      status: DRAFT_OR_FROZEN
      question_scope: REQUIRED
      context:
        species: REQUIRED
        compartments:
        - REQUIRED
        boundary_conditions: REQUIRED
        valid_ranges: REQUIRED
      state_variables:
      - id: REQUIRED
        meaning: DOMAIN_DECLARED_AFTER_CALIBRATION
        unit: REQUIRED
        initial_state_source: REQUIRED
        observable: true
      inputs:
      - id: REQUIRED
        entry_node: REQUIRED
        unit: REQUIRED
        direction_convention: positive_increases_declared_state
      dynamics:
        model_type: LINEAR_DISCRETE_OR_NONLINEAR_EXTERNAL_OR_EVIDENCE_ONLY
        time_step: REQUIRED_FOR_DYNAMIC_MODEL
        A: Matrix_or_UNRESOLVED
        B: Matrix_or_UNRESOLVED
        g_external_model: OPTIONAL
        process_noise: OPTIONAL
        parameter_provenance: REQUIRED
        identifiability_status: REQUIRED
      reader_family:
      - reader_id: REQUIRED
        equation_or_algorithm: REQUIRED
        C: Matrix_or_UNRESOLVED
        D: Matrix_or_UNRESOLVED
        unit: REQUIRED
        horizon: REQUIRED
      invariants:
      - invariant_id: REQUIRED
        equation_or_test: REQUIRED
        tolerance: REQUIRED
      quotient:
        q_algorithm: REQUIRED
        sufficiency_test: REQUIRED
        equivalence_readers:
        - REQUIRED
      calibration:
        training_ids:
        - REQUIRED
        held_out_commitment_hash: REQUIRED
        frozen_parameters_hash: REQUIRED_AFTER_FIT
      evidence:
      - EvidenceRecord
  SourceCard:
    required:
    - source_id
    - source_class
    - identity
    - constituents_or_parts
    - matrix_or_formulation
    - processing
    - batch
    - provenance
    template:
      source_id: REQUIRED
      source_class: DRUG_PRODUCT_OR_WHOLE_FOOD_OR_NUTRIENT_OR_BOTANICAL_OR_EXTRACT_OR_COMBINATION
      identity:
        names:
        - REQUIRED
        taxonomic_or_chemical_or_product_identifiers:
        - REQUIRED
        modality_id: REQUIRED
      constituents_or_parts:
      - constituent_id: REQUIRED
        identity_confidence: 0_to_1
        amount: Scalar_or_Interval_or_UNRESOLVED
        unknown_fraction: OPTIONAL
      matrix_or_formulation:
        physical_state: REQUIRED
        release_relevant_features:
        - REQUIRED
        heterogeneity: REQUIRED
      processing:
        operations:
        - REQUIRED
        parameters: MEASURED_OR_UNRESOLVED
        processing_hash: REQUIRED_FOR_FROZEN_PRODUCT
      batch:
        batch_id: REQUIRED
        fingerprint: REQUIRED_FOR_MIXTURE
        stability: REQUIRED_OR_UNRESOLVED
      provenance:
      - Provenance
  ExposureCard:
    required:
    - source_id
    - active_species
    - route
    - compartments
    - time_axis
    - exposure_model
    - uncertainty
    - evidence
    template:
      source_id: REQUIRED
      active_species:
      - REQUIRED
      route: REQUIRED
      compartments:
      - compartment_id: REQUIRED
        time_series: TimeSeries_or_Interval_or_UNRESOLVED
        free_or_active_fraction: Scalar_or_Interval_or_UNRESOLVED
      time_axis: REQUIRED
      exposure_model:
        type: MEASURED_OR_COMPARTMENTAL_OR_EMPIRICAL_BOUNDED_OR_UNRESOLVED
        equations_or_algorithm: REQUIRED_UNLESS_UNRESOLVED
        parameters: REQUIRED_UNLESS_UNRESOLVED
        valid_range: REQUIRED
      uncertainty: REQUIRED
      evidence:
      - EvidenceRecord
  InterventionOperatorCard:
    required:
    - operator_id
    - source_id
    - lane_id
    - node_actions
    - time_profile
    - context
    - provenance
    template:
      operator_id: REQUIRED
      source_id: REQUIRED
      lane_id: REQUIRED
      node_actions:
      - lane_input_id: REQUIRED
        target_or_process: DOMAIN_DECLARED
        action_mode: AGONISM_OR_ANTAGONISM_OR_INHIBITION_OR_ACTIVATION_OR_PHYSICAL_OR_SUBSTRATE_OR_CONTEXT
        direction: -1_0_or_1
        magnitude_time_series: TimeSeries_or_Interval_or_UNRESOLVED
        compartment: REQUIRED
        species: REQUIRED
        state_dependence: OPTIONAL
        uncertainty: REQUIRED
      time_profile: REQUIRED
      context: REQUIRED
      provenance:
      - Provenance
  EvidenceRecord:
    required:
    - evidence_id
    - tier
    - question
    - population_or_system
    - intervention
    - comparator
    - readouts
    - effect
    - uncertainty
    - limitations
    - provenance
    template:
      evidence_id: REQUIRED
      tier: evidence_tier_enum
      question: REQUIRED
      population_or_system: REQUIRED
      intervention: REQUIRED
      comparator: REQUIRED
      readouts:
      - REQUIRED
      effect: Scalar_or_Interval_or_TimeSeries
      uncertainty: REQUIRED
      limitations:
      - REQUIRED
      provenance: Provenance
  SafetyCard:
    required:
    - source_id
    - desired_lane_risks
    - off_lane_risks
    - organ_risks
    - interaction_risks
    - context_exclusions
    - evidence
    template:
      source_id: REQUIRED
      desired_lane_risks:
      - REQUIRED_OR_NONE
      off_lane_risks:
      - lane_id: REQUIRED
        risk_direction: REQUIRED
        severity: Scalar_or_Interval_or_UNRESOLVED
      organ_risks:
      - REQUIRED_OR_NONE
      interaction_risks:
      - REQUIRED_OR_NONE
      context_exclusions:
      - REQUIRED_OR_NONE
      evidence:
      - EvidenceRecord
  DesignRequestCard:
    required:
    - design_id
    - problem_id
    - design_mode
    - desired_lane_signature
    - allowed_modalities
    - safety_exclusions
    - evidence_floor
    template:
      design_id: REQUIRED
      problem_id: REQUIRED
      design_mode: FOOD_PORTFOLIO_OR_EXISTING_DRUG_REPURPOSING_OR_ABSTRACT_DRUG_CANDIDATE_FAMILY
      desired_lane_signature:
      - lane_id: REQUIRED
        reader_id: REQUIRED
        desired_trajectory_or_interval: REQUIRED
        time_window: REQUIRED
        priority_weight: FROZEN_NUMBER
      allowed_modalities:
      - REQUIRED
      safety_exclusions:
      - REQUIRED
      evidence_floor: REQUIRED
  RunCard:
    required:
    - run_id
    - root_version
    - problem_card_hash
    - lane_card_hashes
    - source_card_hashes
    - split_manifest
    - metrics
    - tolerances
    - randomness
    template:
      run_id: REQUIRED
      root_version: RG-UTW-1.2.0
      problem_card_hash: REQUIRED
      lane_card_hashes:
      - REQUIRED
      source_card_hashes:
      - REQUIRED
      split_manifest:
        rule_frozen_before_fit: true
        training_ids:
        - REQUIRED
        held_out_ids_or_commitment_hash: REQUIRED
        maker_visibility: TRAINING_ONLY
        checker_visibility: HELD_OUT_ONLY
      metrics:
      - REQUIRED
      tolerances: REQUIRED
      randomness:
        allowed: false
        seed: REQUIRED_IF_ALLOWED
domain_declared_mathematics:
  notice: The equations in this section are calculational interfaces declared for the drug–food–lane domain. They are
    not root-derived biological laws. Their parameters must come from retained data and calibration.
  source_encoder:
    level: DOMAIN_DECLARED
    equation: s_x=e_S(\mathcal T_x;\theta_S)
    requirements:
    - feature definitions frozen
    - units frozen
    - missing values retained as UNRESOLVED
    - lineage from every feature to source tape
  exposure_translation:
    level: DOMAIN_DECLARED
    equation: e_x(c,t)=\mathcal X_c(s_x,t;\theta_X)
    requirements:
    - measured exposure preferred
    - model parameters calibrated in declared range
    - active species declared
    - food matrix and formulation retained
    - no assumed bioavailability constant
  intervention_operator:
    level: DOMAIN_DECLARED
    equation: u_{x,L,j}(t)=\sum_k \mathcal R_{j,k}(e_{x,k}(c_j,t),z_L(t),c;\theta_R)
    interpretation: Each active species or physical food operator contributes to a typed input node of lane L.
    requirements:
    - target or process reader declared
    - direction convention declared
    - compartment and species declared
    - magnitude uncertainty retained
    - multi-constituent interactions retained when load-bearing
  lane_dynamics_linear_reference:
    level: REFERENCE
    state_equation: z_{t+1}=A_Lz_t+B_Lu_{x,L,t}+g_L(z_t,c)+w_t
    readout_equation: y_t=C_Lz_t+D_Lu_{x,L,t}+h_L(z_t,c)+v_t
    conditions:
    - A, B, C, D and optional g, h are Lane Card parameters
    - linear reduction requires an audited approximation
    - nonlinear or evidence-only models may replace this reference
    - state and readout units must be compatible
  lane_operator_vector:
    level: DOMAIN_DECLARED
    equation: \Lambda_L(x)=\{u_{x,L,j}(t)\}_{j,t,c}
    meaning: Typed lane-control trajectory produced by drug, food, nutrient, herb, mixture or abstract intervention.
  drug_food_reader_match:
    level: DOMAIN_DECLARED
    exact_equation: d\sim_{L,Q}f \iff O^\sharp_{\alpha,L}(Z_d^L)=O^\sharp_{\alpha,L}(Z_f^L)\ \forall\alpha\in\mathscr
      R_{L,Q}
    toleranced_equation: D_{L,Q}(d,f)\le\tau_{L,Q}\land\epsilon_{\mathrm{dyn}},\epsilon_{\mathrm{read}},\epsilon_{\mathrm{inv}},\epsilon_{\mathrm{bridge}},\epsilon_{\mathrm{cal}}\le\tau
  multidimensional_match_distance:
    level: REFERENCE
    equation: D_{L,Q}(a,b)=(D_{\mathrm{node}},D_{\mathrm{trajectory}},D_{\mathrm{exposure}},D_{\mathrm{safety}},D_{\mathrm{evidence}})
    components:
      D_node: weighted normalized distance between aligned node-action trajectories; UNRESOLVED when node alignment is
        missing
      D_trajectory: weighted normalized RMSE between declared lane-reader trajectories
      D_exposure: weighted normalized RMSE or interval gap across matched compartments and time
      D_safety: maximum or weighted sum of declared off-lane and organ-risk excesses
      D_evidence: gate vector for tier, context, provenance and held-out support; not a substitute for efficacy
    default_rule: Do not collapse to one scalar unless weights, normalization and loss function are frozen in the Run
      Card.
  food_portfolio_design:
    level: REFERENCE
    decision_variables: abstract inclusion weights a_i in [0,1]; research mixture weights, not eating portions
    objective: \min_{\mathbf a}\|\Lambda_L^\star-\sum_i a_i\Lambda_L(f_i)\|_{W_L}+\lambda_RR(\mathbf a)+\lambda_UU(\mathbf
      a)+\lambda_CC(\mathbf a)
    constraints:
    - 0\le a_i\le1
    - minimum evidence tier satisfied
    - no safety exclusion violated
    - unknown exposure cannot be treated as zero
    - food candidates remain identifiable by batch, processing and matrix
    output_boundary: abstract portfolio and evidence gaps only; no individualized diet or therapeutic substitution instructions
  existing_drug_repurposing:
    level: REFERENCE
    objective: \operatorname{rank}(d_i)=\operatorname{ParetoRank}(D_{\mathrm{lane}},D_{\mathrm{exposure}},D_{\mathrm{safety}},D_{\mathrm{evidence}})
    output: ranked hypotheses with original indication, context limits and safety defects
  abstract_drug_candidate_family_design:
    level: REFERENCE
    decision_variable: abstract operator envelope lambda, not a molecular graph or synthesis plan
    objective: \min_{\lambda}\|\Lambda_L^\star-\lambda\|_{W_L}+\lambda_XD_{\mathrm{exposure}}(\lambda)+\lambda_RD_{\mathrm{safety}}(\lambda)+\lambda_UD_{\mathrm{uncertainty}}(\lambda)
    required_output:
    - modality_family
    - target_or_process_nodes
    - desired_transition_directions
    - compartment
    - time_profile
    - exposure_envelope
    - anti_target_and_anti_lane_exclusions
    - minimum_evidence_plan
    - unresolved_variables
    forbidden_output:
    - exact molecular structure
    - SMILES
    - synthesis route
    - manufacturing conditions
    - human dose
runtime_pipeline:
- stage: 00_GOVERNANCE_AND_DRIFT_GUARD
  inputs:
  - ProblemCard
  - RunCard
  - source manifests
  algorithm:
  - verify required hashes and versions
  - verify disease and target answers were not inserted as root premises
  - verify split was frozen before fitting
  outputs:
  - governance_report
  failures:
  - DRIFT
  - MISSING_PROVENANCE
  - TARGET_LEAKAGE
- stage: 01_RETENTION
  inputs:
  - raw observations
  - product records
  - food composition
  - experiments
  algorithm:
  - append observations to ordered tape
  - retain units, uncertainty, missingness, context and lineage
  - do not attach biological meaning yet
  outputs:
  - retained_tapes
  failures:
  - LOST_INFORMATION
  - INSUFFICIENT_RESOLUTION
- stage: 02_TYPE_AND_SOURCE_ENCODING
  inputs:
  - retained_tapes
  - SourceCards
  algorithm:
  - validate identity, batch, processing, matrix and constituents
  - apply frozen source encoder
  - preserve unknown fraction
  outputs:
  - typed_source_states
  failures:
  - MISTRANSLATION
  - UNTYPED_INPUT
  - BATCH_IDENTITY_FAILURE
- stage: 03_MODALITY_ROUTING
  inputs:
  - typed_source_states
  - modality registry
  algorithm:
  - activate modality-specific cards
  - forbid invalid reductions such as mixture-to-single-molecule without evidence
  outputs:
  - activated_representation_cards
  failures:
  - MODALITY_MISMATCH
  - FORBIDDEN_REDUCTION
- stage: 04_EXPOSURE_COMPILATION
  inputs:
  - SourceCards
  - ExposureCards
  algorithm:
  - compile measured or calibrated active-species exposure by compartment and time
  - return UNRESOLVED for missing active fraction or out-of-range extrapolation
  outputs:
  - exposure_states
  - epsilon_exposure
  failures:
  - CALIBRATION_FAILURE
  - CONTEXT_MISMATCH
  - OUT_OF_RANGE
- stage: 05_INTERVENTION_OPERATOR_COMPILATION
  inputs:
  - exposure_states
  - InterventionOperatorCards
  algorithm:
  - map active species, physical matrices, substrates and context operators to typed lane inputs
  - retain multi-target and multi-constituent branches
  outputs:
  - lane_input_trajectories
  - epsilon_bridge
  failures:
  - TARGET_LACKS_VARIABLES
  - MISTRANSLATION
  - IDENTIFIABILITY_UNRESOLVED
- stage: 06_LANE_DOMAIN_GATE
  inputs:
  - LaneCards
  - lane_input_trajectories
  algorithm:
  - check state sufficiency
  - construct query-relative quotient
  - audit dynamic commutation, readout and invariants
  outputs:
  - epsilon_dyn
  - epsilon_read
  - epsilon_inv
  - lane_domain_status
  failures:
  - NO_CLOSURE
  - INSUFFICIENT_RESOLUTION
  - CONTEXT_MISMATCH
- stage: 07_PROPAGATE_LANE
  inputs:
  - frozen LaneCard
  - initial state
  - lane input trajectories
  algorithm:
  - execute declared linear, nonlinear, empirical or evidence-only model
  - retain full state trajectory and solver residuals
  outputs:
  - lane_state_trajectories
  - solve_report
  failures:
  - SINGULAR_SOLVE
  - NUMERICAL_INSTABILITY
  - MODEL_OUT_OF_RANGE
- stage: 08_READOUT_AND_MEANING
  inputs:
  - lane_state_trajectories
  - reader family
  - calibration certificate
  algorithm:
  - compute native readouts
  - freeze native outputs
  - apply independent semantic calibration
  outputs:
  - native_readouts
  - named_readouts
  - epsilon_cal
  failures:
  - CALIBRATION_FAILURE
  - READOUT_FACTOR_FAILURE
- stage: 09_SAFETY_AND_INTERACTIONS
  inputs:
  - SafetyCards
  - lane states
  - person context
  algorithm:
  - compile desired-lane risk, off-lane risk, organ risk and interactions
  - unknown risk remains UNRESOLVED
  outputs:
  - risk_vector
  - safety_status
  failures:
  - SAFETY_EXCLUSION
  - INTERACTION_CONFLICT
  - CONTEXT_MISMATCH
- stage: 10_BIDIRECTIONAL_MATCH
  inputs:
  - drug operators
  - food operators
  - lane readers
  - RunCard metrics
  algorithm:
  - align contexts, nodes, time axes and readers
  - compute multidimensional distance vector
  - classify the strongest admitted match level
  outputs:
  - match_vector
  - match_status
  - named_mismatches
  failures:
  - NODE_ALIGNMENT_MISSING
  - EXPOSURE_UNRESOLVED
  - EVIDENCE_GAP
- stage: 11_DESIGN
  inputs:
  - DesignRequestCard
  - admitted intervention library
  algorithm:
  - choose food portfolio, existing-drug hypotheses or abstract candidate-family envelope
  - solve declared constrained optimization
  - preserve Pareto alternatives instead of hiding trade-offs
  outputs:
  - design_candidates
  - Pareto_front
  - unresolved_constraints
  failures:
  - NO_FEASIBLE_SOLUTION
  - EVIDENCE_FLOOR_NOT_MET
  - SAFETY_CONSTRAINT_FAILED
- stage: 12_MAKER_CHECKER
  inputs:
  - frozen predictions
  - held-out bundle
  - controls
  algorithm:
  - checker reveals held-out outcomes only after freeze
  - positive control must pass
  - negative control must fail as preregistered
  outputs:
  - checker_report
  failures:
  - HELD_OUT_THRESHOLD_EXCEEDED
  - POSITIVE_CONTROL_FAILED
  - NEGATIVE_CONTROL_DID_NOT_FAIL
  - TRAIN_TEST_LEAKAGE
- stage: 13_BOUNDED_REPORT
  inputs:
  - all stage reports
  algorithm:
  - use weakest load-bearing status
  - separate structural, mechanistic, preclinical and human claims
  - list cannot-claim statements and next bottleneck
  outputs:
  - DomainRunReport
  - ClaimLedger
  - ReproducibilityRecord
  failures:
  - CLAIM_OVERREACH
  - MISSING_DEFECT_VECTOR
reference_algorithms:
  validate_matrix_dimensions: "FUNCTION VALIDATE_LANE_MATRICES(A, B, C, D, z0, u):\n    REQUIRE A is n×n\n    REQUIRE\
    \ B is n×m\n    REQUIRE C is r×n\n    REQUIRE D is r×m\n    REQUIRE len(z0) == n\n    REQUIRE every u[t] has length\
    \ m\n    RETURN PASS_EXACT\nEND"
  propagate_linear_lane: "FUNCTION PROPAGATE_LINEAR_LANE(A, B, C, D, z0, U, optional_g, optional_h):\n    VALIDATE_LANE_MATRICES(A,\
    \ B, C, D, z0, U)\n    z = z0\n    states = [z0]\n    readouts = []\n    FOR t FROM 0 TO len(U)-1:\n        u = U[t]\n\
    \        y = C @ z + D @ u + h(z, context)\n        readouts.APPEND(y)\n        z_next = A @ z + B @ u + g(z, context)\n\
    \        REQUIRE all values finite\n        states.APPEND(z_next)\n        z = z_next\n    RETURN states, readouts,\
    \ solve_residuals\nEND"
  normalized_rmse: "FUNCTION NORMALIZED_RMSE(a, b, scale):\n    REQUIRE aligned shapes\n    REQUIRE scale > 0\n    RETURN\
    \ sqrt(mean((a-b)^2)) / scale\nEND"
  classify_match: "FUNCTION CLASSIFY_MATCH(drug, food, lane, run):\n    REQUIRE same declared context OR RETURN CONTEXT_MISMATCH\n\
    \    node_distance = NODE_DISTANCE(drug.operator, food.operator)\n    trajectory_distance = TRAJECTORY_DISTANCE(drug.readouts,\
    \ food.readouts)\n    exposure_distance = EXPOSURE_DISTANCE(drug.exposure, food.exposure)\n    safety_distance =\
    \ SAFETY_DISTANCE(drug.safety, food.safety)\n    evidence_gate = EVIDENCE_GATE(drug.evidence, food.evidence, run.evidence_floor)\n\
    \    IF any required input is missing: RETURN UNRESOLVED\n    IF safety exclusion is violated: RETURN OBSTRUCTED\n\
    \    IF trajectory only passes: RETURN OUTCOME_ONLY\n    IF lane trajectory passes but nodes differ: RETURN LANE_MATCH\n\
    \    IF node and trajectory pass: RETURN NODE_MATCH\n    IF node, operator, exposure and time profile pass: RETURN\
    \ OPERATOR_MATCH\n    NEVER return therapeutic equivalence without held-out human evidence\nEND"
  design_food_portfolio: "FUNCTION DESIGN_FOOD_PORTFOLIO(target, foods, constraints):\n    FILTER foods by provenance,\
    \ evidence floor, context and safety\n    BUILD operator matrix V with one column per admitted food\n    SOLVE bounded\
    \ constrained optimization for abstract weights a in [0,1]\n    RETURN Pareto-optimal portfolios, uncovered lane\
    \ components,\n           interaction conflicts and uncertainty vector\n    DO NOT convert weights into individualized\
    \ eating instructions\nEND"
  design_abstract_drug_family: "FUNCTION DESIGN_ABSTRACT_DRUG_FAMILY(target_lane, modalities, exclusions):\n    COMPILE\
    \ required lane nodes, directions, compartments and time profile\n    ENUMERATE modality families able to instantiate\
    \ the typed operator\n    REJECT modalities violating exposure or safety exclusions\n    RETURN abstract operator\
    \ envelopes and required evidence plans\n    DO NOT output exact molecules, structures, synthesis, manufacturing\
    \ or dose\nEND"
verification_and_claim_contract:
  maker_checker:
    rule_frozen_before_fit: true
    maker_visibility: TRAINING_ONLY
    checker_visibility: HELD_OUT_ONLY
    required_controls:
      positive_control: known intervention expected to reproduce the declared lane/readout
      negative_control: mechanistically incompatible or shuffled intervention expected to fail
  claim_gate:
    PASS_when:
    - provenance complete
    - no train-test leakage
    - calibration valid for observed range
    - all required defects within frozen tolerances
    - held-out thresholds pass when an evidentiary prediction is claimed
    - positive control passes
    - negative control fails as required
    otherwise: FAIL_OR_UNRESOLVED
    weakest_support_rule: true
  failure_codes:
  - MISTRANSLATION
  - LOST_INFORMATION
  - INSUFFICIENT_RESOLUTION
  - TARGET_LACKS_VARIABLES
  - NO_CLOSURE
  - CONTEXT_MISMATCH
  - CALIBRATION_FAILURE
  - IDENTIFIABILITY_UNRESOLVED
  - OUT_OF_RANGE
  - SAFETY_EXCLUSION
  - TRAIN_TEST_LEAKAGE
  - CLAIM_OVERREACH
