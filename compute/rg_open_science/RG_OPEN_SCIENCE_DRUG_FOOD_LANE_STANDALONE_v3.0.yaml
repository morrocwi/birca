  RG_UTW_v1_2:
    filename: READOUT_GENESIS_UNIVERSAL_TECHNICAL_WHITEPAPER_v1.2_EN.yaml.pseudo.dag(2).md
    sha256: ee656c8aa6489f70fc26c7d074637eb330cb89eb06e3bd43ed4cdd4a39341c15
    encoding: utf-8
    content: "# Readout Genesis Universal Technical Whitepaper\n\n## Standalone Human–AI Executable Specification — English\
      \ Edition\n\n```yaml\ndocument:\n  id: RG-UTW\n  title: Readout Genesis Universal Technical Whitepaper\n  version:\
      \ 1.2.0\n  release_status: INTERNAL_PEER_REVIEWED_WITH_CONCRETE_REFERENCE_DOMAIN\n  language:\n    normative_prose:\
      \ English\n    machine_keys: English\n    mathematics: LaTeX\n  format:\n    container: Markdown\n    embedded_languages:\n\
      \      - YAML\n      - pseudocode\n      - DAG\n      - LaTeX\n  standalone: true\n  intended_users:\n    - human_researcher\n\
      \    - ai_reasoning_system\n    - software_implementer\n    - independent_checker\n  primary_goal:\n    - \"accept\
      \ typed inputs\"\n    - \"execute a deterministic procedure\"\n    - \"return reproducible outputs and named defects\"\
      \n    - \"classify PASS, FAIL, or UNRESOLVED without guessing author intent\"\n  philosophical_governance:\n  \
      \  lead_role: true\n    rule: \"Information philosophy fixes the order by which meaning becomes admissible and\
      \ governs every translation\"\n  use_mode:\n    default: calculate_then_check\n    debate_required_for_execution:\
      \ false\n    interpretation_is_bounded_by_machine_gates: true\n  theory_boundary:\n    universal_research_architecture:\
      \ true\n    executable_finite_reference_kernel: true\n    complete_final_law_of_nature: false\n    unique_end_to_end_domain_derivation:\
      \ false\n    universal_empirical_validation: false\n    concrete_reference_domain: true\n    frozen_held_out_reference_benchmark:\
      \ true\n  source_lineage:\n    primary_architecture:\n      id: RG-UMB\n      version: 1.0\n      role: \"newer\
      \ universal architecture and anti-drift root\"\n    legacy_superset:\n      id: READOUT_GENESIS_CORE\n      edition:\
      \ 3.1\n      git_commit: c341162ef06cc37b97b21447dcbfd5b2e2688aef\n      role: \"older but richer operational,\
      \ epistemic, computational and provenance material\"\n  precedence:\n    - philosophical_constitution\n    - normative_root_contract\n\
      \    - typed_mathematical_interfaces\n    - executable_algorithms\n    - verification_and_claim_ledger\n    - domain_semantics\n\
      \    - legacy_interpretations\n  peer_review_resolution:\n    language: English_only\n    duplicate_sections_removed:\
      \ true\n    ambiguous_graph_metric_notation_removed: true\n    exact_gate_typing_repaired: true\n    inequality_constraints_completed_with_KKT:\
      \ true\n    pseudocode_dependencies_made_explicit: true\n    claim_control_requirements_made_status_conditional:\
      \ true\n    coupled_kernel_fixtures_extended: true\n    concrete_domain_card_added: true\n    concrete_operator_and_encoder_added:\
      \ true\n    calibration_and_held_out_checker_added: true\n```\n\n---\n\n# 0. How to Use This Document\n\nThis single\
      \ file is a **technical whitepaper**, **reference specification**, **runtime protocol**, and **anti-drift constitution**.\n\
      \nNormative keywords:\n\n```yaml\nnormative_keywords:\n  MUST: \"required; otherwise the result is not admissible\"\
      \n  MUST_NOT: \"forbidden; otherwise the result is INVALID or DRIFT\"\n  SHOULD: \"recommended; any omission requires\
      \ a recorded reason\"\n  MAY: \"permitted only when claim scope is unchanged\"\n```\n\nEvery normative module MUST\
      \ expose the following chain:\n\n```text\nINPUT\n  ↓\nTYPE + SUFFICIENCY\n  ↓\nTRANSFORM / SOLVE\n  ↓\nOUTPUT\n\
      \  ↓\nINVARIANT + DEFECT\n  ↓\nPASS / FAIL / UNRESOLVED\n  ↓\nBOUNDED CLAIM\n```\n\nA result missing its `input\
      \ schema`, `equations`, `algorithm`, `defects`, `controls`, or `claim status` MUST NOT be reported as compliant\
      \ with this whitepaper.\n\n```yaml\nConformanceLevels:\n  NORMATIVE:\n    meaning: required for compliance\n  REFERENCE:\n\
      \    meaning: executable default that may be replaced by an equivalent declared implementation\n  OPTIONAL:\n \
      \   meaning: used only when requested by the Domain Card\n\nNumericalConvention:\n  exact_arithmetic:\n    zero_test:\
      \ equality\n  floating_point:\n    norm: MUST_BE_DECLARED_PER_DEFECT\n    absolute_tolerance: MUST_BE_FROZEN\n\
      \    relative_tolerance: MUST_BE_FROZEN\n    comparison_rule: MUST_BE_DECLARED\n  missing_metric_or_tolerance:\n\
      \    status: UNRESOLVED\n```\n\n---\n\n# 1. Information Philosophy as the System Constitution\n\n## 1.1 Foundational\
      \ Principles\n\n```yaml\nInformationPhilosophyConstitution:\n  P1_no_built_in_domain_labels:\n    statement: \"\
      The root contains no built-in labels such as physics, chemistry, biology, mind, AI, or society.\"\n    machine_consequence:\n\
      \      - \"root schema MUST NOT contain domain-final nouns or laws\"\n      - \"semantic labels attach only after\
      \ a valid translation\"\n\n  P2_difference_before_entity:\n    statement: \"Difference precedes the name of what\
      \ differs.\"\n    machine_consequence:\n      - \"encode distinctions before assigning entity types\"\n      -\
      \ \"entity identity MUST be a retained/readable equivalence class\"\n\n  P3_history_before_container_time:\n  \
      \  statement: \"Ordered change precedes time treated as a container.\"\n    machine_consequence:\n      - \"native\
      \ runtime uses ordered tape indices\"\n      - \"continuous time is an optional calibrated readout\"\n\n  P4_retention_before_persistence_semantics:\n\
      \    statement: \"A state becomes reportable only when some distinction is retained.\"\n    machine_consequence:\n\
      \      - \"every state claim MUST identify retained records\"\n      - \"unretained differences cannot be reconstructed\
      \ downstream\"\n\n  P5_reader_creates_domain_access_not_root_truth:\n    statement: \"A reader makes structure\
      \ accessible; it does not retroactively create the root.\"\n    machine_consequence:\n      - \"reader family MUST\
      \ be declared\"\n      - \"reader equivalence MUST NOT be promoted to absolute identity\"\n\n  P6_domain_is_translation:\n\
      \    statement: \"A domain is a minimal sufficient dynamically closed translation.\"\n    machine_consequence:\n\
      \      - \"a domain MUST pass sufficiency, quotient, dynamics and readout gates\"\n      - \"naming a subject is\
      \ never enough\"\n\n  P7_meaning_after_readout:\n    statement: \"Meaning arises after readout under context; it\
      \ is not stored in the root.\"\n    machine_consequence:\n      - \"semantic report is separated from native output\"\
      \n      - \"same numeric output MAY carry different semantic roles\"\n\n  P8_translation_must_account_for_loss:\n\
      \    statement: \"Every non-exact translation must identify where distinctions are lost.\"\n    machine_consequence:\n\
      \      - \"every approximate bridge MUST return a defect vector\"\n      - \"silent equivalence is forbidden\"\n\
      \n  P9_claim_cannot_borrow_certainty:\n    statement: \"A claim at one layer may not borrow certainty from another\
      \ layer.\"\n    machine_consequence:\n      - \"formal structure does not certify empirical meaning\"\n      -\
      \ \"finite tests do not certify continuum or universal claims\"\n\n  P10_report_is_last:\n    statement: \"A report\
      \ is emitted only after retention, structure, translation, calibration, and checking.\"\n    machine_consequence:\n\
      \      - \"claim emission is the final pipeline stage\"\n```\n\n## 1.2 Mandatory Derivation Order\n\n\\[\n\\boxed{\n\
      \\text{Retention}\n\\rightarrow\n\\text{Structure}\n\\rightarrow\n\\text{Translation}\n\\rightarrow\n\\text{Meaning}\n\
      \\rightarrow\n\\text{Report}\n}\n\\]\n\nForbidden order:\n\n\\[\n\\boxed{\n\\text{Textbook Name}\n\\rightarrow\n\
      \\text{Import Final Law}\n\\rightarrow\n\\text{Fit Parameters}\n\\rightarrow\n\\text{Declare Derived}\n}\n\\]\n\
      \n```yaml\nForbiddenOrderGuard:\n  input:\n    proposed_root_terms: list\n    target_domain: optional\n    target_outputs:\
      \ optional\n  fail_when:\n    - \"a target-domain final law appears as a root premise\"\n    - \"a target answer\
      \ is inserted as a coefficient or eigenvalue\"\n    - \"semantic naming precedes a passed translation gate\"\n\
      \    - \"held-out outcomes influenced model construction\"\n  output_status:\n    detected: DRIFT\n    not_detected:\
      \ CONTINUE\n```\n\n## 1.3 Philosophy Is Operational, Not Decorative\n\nInformation philosophy performs four binding\
      \ functions:\n\n1. defines the minimal ontology\n2. fixes the derivation order\n3. defines what may not enter the\
      \ root\n4. sets the permitted strength of reports\n\nTherefore, every philosophical principle MUST have at least\
      \ one `machine_consequence`, and every major guard MUST cite the principle it enforces.\n\n---\n\n# 2. Layer Separation\
      \ Against Claim Drift\n\n```yaml\nArchitectureLayers:\n  L0_ontology:\n    objects:\n      - retained_distinction\n\
      \      - ordered_history\n      - reader_capability\n      - admissibility\n      - positive_retained_pairing\n\
      \    question: \"What is retained, and what remains distinguishable?\"\n\n  L1_structure:\n    objects:\n     \
      \ - typed_state\n      - equivalence_class\n      - automorphism\n      - transport\n      - holonomy\n      -\
      \ closure\n    question: \"What structure follows from retention and readout?\"\n\n  L2_dynamics:\n    objects:\n\
      \      - action_interface\n      - finite_reference_kernel\n      - constraints\n      - transfer_operator\n  \
      \  question: \"How does the structure evolve?\"\n\n  L3_translation:\n    objects:\n      - domain_card\n     \
      \ - sufficiency\n      - quotient\n      - bridge\n      - calibration\n    question: \"How does a domain read\
      \ the dynamics?\"\n\n  L4_epistemic:\n    objects:\n      - registrar\n      - maker\n      - freeze\n      - checker\n\
      \      - controls\n    question: \"Was the claim checked independently?\"\n\n  L5_report:\n    objects:\n     \
      \ - claim_ledger\n      - scope\n      - defect_vector\n      - reproducibility_record\n    question: \"What may\
      \ actually be claimed?\"\n```\n\nBinding rules:\n\n```yaml\nLayerNonBorrowingRules:\n  - \"L0 axiom does not prove\
      \ L3 domain semantics\"\n  - \"L1 mathematical closure does not prove L2 is nature's unique dynamics\"\n  - \"\
      L2 finite execution does not prove continuum existence\"\n  - \"L3 calibration fit does not equal held-out prediction\"\
      \n  - \"L4 clean protocol does not prove the model true\"\n  - \"L5 wording MUST use the weakest load-bearing status\"\
      \n```\n\n---\n\n# 3. Root, Types, and State Variables\n\n## 3.1 Root primitives\n\nMinimal root primitives admitted\
      \ by this whitepaper:\n\n```yaml\nRootPrimitives:\n  distinction_record:\n    symbol: delta_R\n    meaning: \"\
      record that at least one distinction is retained\"\n    primitive: true\n\n  ordered_tape:\n    symbol: T\n   \
      \ meaning: \"append-only order of events, rewrites, residues and deviations\"\n    primitive: true\n\n  reader_family:\n\
      \    symbol: O\n    meaning: \"declared maps that can distinguish, store or act on retained records\"\n    primitive:\
      \ true\n\n  admissibility_language:\n    symbol: C\n    meaning: \"rules stating admitted, obstructed or unresolved\
      \ constructions\"\n    primitive: true\n\n  positive_retained_pairing:\n    symbol: G\n    meaning: \"positive\
      \ pairing used to measure retained load\"\n    primitive: true\n```\n\nThe following are **not root primitives\
      \ by default**:\n\n```yaml\nNotRootByDefault:\n  - spacetime\n  - particle\n  - molecule\n  - gene\n  - neuron\n\
      \  - institution\n  - physical_energy\n  - mass\n  - force\n  - probability\n  - continuum\n  - SI_units\n  - domain_final_equation\n\
      ```\n\n## 3.2 Canonical state\n\nTo remove earlier ambiguity, the `closure ledger` is distinct from `constraint\
      \ multipliers`; derived-but-reified operational variables are also distinct from primitives.\n\n\\[\n\\boxed{\n\
      Z_n=\n\\left(\n\\Phi_n,\\Psi_n,\\Theta_n,\\Sigma_n,\n\\mathcal T_n,G_n,\\mathcal L^{\\mathrm{cl}}_n;\nU_n,\\Gamma_n,\\\
      Xi_n\n\\right)\n}\n\\]\n\nEvery canonical slot exists at the schema level. A slot may be inactive only with an\
      \ explicit\n`inactive_with_reason` status and a proof that no declared readout requires it.\n\nThe semicolon separates:\n\
      \n- left: primary retained-state slots\n- right: derived or reified operational slots retained for reproducibility\n\
      \n```yaml\nStateSchema:\n  Phi:\n    role: proposed_distinction_state\n    type: vector_or_typed_record\n    required:\
      \ true\n\n  Psi:\n    role: companion_record_response\n    type: vector_or_typed_record\n    required_when: record_response_or_backreaction_is_load_bearing\n\
      \    inactive_status_allowed: true\n    zero_allowed: true\n\n  Theta:\n    role: relational_geometry_translation_state\n\
      \    type: vector_matrix_or_graph_parameters\n    required_when: geometry_or_basis_is_dynamic_or_read\n    inactive_status_allowed:\
      \ true\n\n  Sigma:\n    role: retained_order_reference\n    type: vector_or_structured_record\n    required_when:\
      \ order_or_orientation_is_read\n    inactive_status_allowed: true\n\n  Tape:\n    role: append_only_history\n \
      \   type: ordered_sequence\n    required: true\n\n  G:\n    role: positive_retained_metric\n    type: hermitian_positive_definite_operator\n\
      \    required: true\n\n  L_cl:\n    role: closure_and_lineage_ledger\n    type: structured_record\n    required:\
      \ true\n    legacy_alias: Lambda\n\n  U:\n    role: transport\n    status: derived_then_reified\n    type: family_of_linear_or_typed_maps\n\
      \    required_when: local_frames_or_path_comparison_is_used\n    inactive_status_allowed: true\n\n  Gamma:\n  \
      \  role: orientation_grading\n    status: derived_or_declared_with_provenance\n    required_when: grading_is_used\n\
      \    inactive_status_allowed: true\n    constraints:\n      - \"Gamma_dagger = Gamma\"\n      - \"Gamma_squared\
      \ = I\"\n\n  Xi:\n    role: orientation_selecting_order\n    status: derived_or_declared_with_provenance\n    required_when:\
      \ orientation_selection_is_used\n    inactive_status_allowed: true\n    constraint: \"odd under declared tape reversal\"\
      \n\n  lambda_multiplier:\n    symbol: lambda_n^a\n    role: constraint_multiplier\n    status: auxiliary_not_part_of_L_cl\n\
      ```\n\n## 3.3 Positive retained metric\n\n\\[\nG_n=G_n^\\dagger,\\qquad G_n\\succ0\n\\]\n\n\\[\n\\langle x,y\\\
      rangle_{G_n}=x^\\dagger G_ny,\n\\qquad\n\\|x\\|_{G_n}^2=x^\\dagger G_nx\\ge0\n\\]\n\n```yaml\nPositiveMetricGate:\n\
      \  checks:\n    - hermitian_within_tolerance\n    - smallest_eigenvalue_above_tolerance\n  pass: \"both checks\
      \ true\"\n  fail: \"any check false\"\n  consequence_on_fail: \"INVALID_STATE_METRIC\"\n```\n\n`retained load`\
      \ MUST NOT be called energy until a domain-specific semantic calibration has passed.\n\n---\n\n# 4. Readers, Equivalence,\
      \ and Domain Formation\n\n## 4.1 Reader equivalence\n\nLet the declared reader family be:\n\n\\[\n\\mathcal O_D=\\\
      {O_\\alpha\\}_{\\alpha\\in\\mathscr R_D}\n\\]\n\nDefine local reader equivalence:\n\n\\[\nx\\sim_{\\mathcal O_D}y\n\
      \\iff\nO_\\alpha(x)=O_\\alpha(y)\n\\quad\\forall\\alpha\n\\]\n\nFor questions with a horizon and interventions,\
      \ use the strong form:\n\n\\[\nq_D(z)=q_D(z')\n\\Rightarrow\nO_{D,n:n+L}(z,u)=O_{D,n:n+L}(z',u)\n\\quad\n\\forall\
      \ u\\in\\mathcal U_D\n\\]\n\nThe domain-readable state is:\n\n\\[\n[Z]_{\\sim_D}\n\\]\n\n## 4.2 Domain definition\n\
      \n\\[\n\\boxed{\n\\mathcal D_D\n=\n\\mathfrak Z_D/\\!\\sim_D\n}\n\\]\n\nwhere \\(\\mathfrak Z_D\\) MUST be sufficient\
      \ before quotienting.\n\n```yaml\nDomainDefinition:\n  phrase: \"minimal sufficient dynamically closed translation\"\
      \n  required_properties:\n    - state_sufficiency\n    - readout_factorization\n    - dynamic_commutation\n   \
      \ - invariant_preservation\n    - declared_context\n    - lineage_preservation\n  not_sufficient:\n    - subject_name\n\
      \    - equation_shape_similarity\n    - dimensional_similarity\n    - one_successful_fit\n    - one_passing_control\n\
      ```\n\n## 4.3 Exact domain gate\n\n\\[\n\\boxed{\nq_{D,n+1}\\circ F_n\n=\nF^\\sharp_{D,n}\\circ q_{D,n}\n}\n\\\
      ]\n\n\\[\n\\boxed{\nO_{D,n}\n=\nO^\\sharp_{D,n}\\circ q_{D,n}\n}\n\\]\n\n\\[\n\\boxed{\n\\mathrm{Inv}_{D,n}\n=\n\
      \\mathrm{Inv}^\\sharp_{D,n}\\circ q_{D,n}\n}\n\\]\n\ndefects:\n\n\\[\n\\epsilon_{\\mathrm{dyn}}\n=\n\\|q_{n+1}F_n-F^\\\
      sharp_nq_n\\|\n\\]\n\n\\[\n\\epsilon_{\\mathrm{read}}\n=\n\\|O_n-O^\\sharp_nq_n\\|\n\\]\n\n\\[\n\\epsilon_{\\mathrm{inv}}\n\
      =\n\\|\\mathrm{Inv}_n-\\mathrm{Inv}^\\sharp_nq_n\\|\n\\]\n\n```yaml\nExactDomainGate:\n  required_declarations:\n\
      \    - sufficiency_status\n    - norm_for_each_defect\n    - tolerance_for_each_defect\n    - arithmetic_mode\n\
      \  exact_when:\n    - sufficiency_status == ADMITTED\n    - epsilon_dyn == 0\n    - epsilon_read == 0\n    - epsilon_inv\
      \ == 0\n  approximate_when:\n    - sufficiency_status == ADMITTED\n    - all_required_defects_within_frozen_tolerances\n\
      \    - at_least_one_required_defect_nonzero\n  fail_when:\n    - sufficiency_status == OBSTRUCTED\n    - any_required_defect_exceeds_frozen_tolerance\n\
      \  unresolved_when:\n    - sufficiency_status == UNRESOLVED\n    - norm_or_tolerance_missing\n    - identifiability_not_decidable\n\
      ```\n\n## 4.4 Failure taxonomy\n\nWhen a commuting square fails, return one or more named causes:\n\n```yaml\n\
      TranslationFailure:\n  allowed_codes:\n    MISTRANSLATION:\n      meaning: \"map itself is wrong or ill-posed\"\
      \n    LOST_INFORMATION:\n      meaning: \"source quotient erased a required distinction\"\n    INSUFFICIENT_RESOLUTION:\n\
      \      meaning: \"retained resolution is too coarse\"\n    TARGET_LACKS_VARIABLES:\n      meaning: \"target state\
      \ has no slot for required structure\"\n    NO_CLOSURE:\n      meaning: \"target has no well-posed update\"\n \
      \   CONTEXT_MISMATCH:\n      meaning: \"law valid in c but applied in c_prime\"\n    CALIBRATION_FAILURE:\n   \
      \   meaning: \"native output cannot be independently decoded\"\n    IDENTIFIABILITY_UNRESOLVED:\n      meaning:\
      \ \"more than one compatible law remains\"\n```\n\nA report saying only “the reduction fails” without a failure\
      \ code is incomplete.\n\n---\n\n# 5. Query-Relative Automorphisms and Transport\n\n## 5.1 Automorphism group\n\n\
      \\[\n\\boxed{\n\\mathcal A_{D,n}\n=\n\\left\\{\nh_n:\nO_{D,n}h_n=O_{D,n},\n\\;\nh_{n+1}F_n=F_nh_n,\n\\;\nh_n^\\\
      dagger G_nh_n=G_n\n\\right\\}\n}\n\\]\n\nThis group is relative to the declared question and readers; it is not\
      \ an absolute symmetry group.\n\n```yaml\nAutomorphismDiscovery:\n  input:\n    - typed_state_space\n    - reader_family\n\
      \    - local_dynamics\n    - retained_metric\n  output:\n    - generators\n    - relations\n    - numerical_or_exact_certificate\n\
      \  must_not:\n    - \"quotient a transformation that changes the declared readout\"\n    - \"assume reflection\
      \ symmetry when orientation is read\"\n```\n\n## 5.2 Transport\n\nWhen labels are local, transport MUST be supplied:\n\
      \n\\[\nU_{j\\leftarrow i}:\\mathcal X_i\\to\\mathcal X_j\n\\]\n\n\\[\n\\boxed{\nU_{j\\leftarrow i}'\n=\nh_jU_{j\\\
      leftarrow i}h_i^{-1}\n}\n\\]\n\ncompatibility with retained metric:\n\n\\[\nU_{j\\leftarrow i}^{\\dagger}\nG_j\n\
      U_{j\\leftarrow i}\n=\nG_i\n\\]\n\nUse equality for isometric transport; otherwise report the metric-compatibility\
      \ defect:\n\n\\[\n\\epsilon_{G,U}\n=\n\\left\\|\nU^\\dagger G_jU-G_i\n\\right\\|\n\\]\n\n## 5.3 Holonomy and curvature\
      \ defect\n\n\\[\nH_C=\\prod_{e\\in C}^{\\rightarrow}U_e\n\\]\n\n\\[\n\\mathcal K_C=H_C-I\n\\]\n\nreadable invariants:\n\
      \n\\[\n\\operatorname{Tr}(H_C),\\qquad\n\\det(H_C),\\qquad\n\\operatorname{spec}(H_C)\n\\]\n\n```yaml\nHolonomyRun:\n\
      \  input:\n    ordered_cycle: list_of_edges\n    edge_transports: map\n    tolerance: number\n  algorithm:\n  \
      \  - \"H = identity\"\n    - \"for edge in ordered_cycle: H = U_edge @ H\"\n    - \"K = H - identity\"\n    - \"\
      compute conjugation invariants\"\n  output:\n    H: matrix\n    K: matrix\n    defect_norm: number\n    trace:\
      \ number\n    determinant: number\n    spectrum: list\n  status:\n    flat_on_cycle: \"defect_norm <= tolerance\"\
      \n    curved_or_drifting: \"defect_norm > tolerance\"\n```\n\nSemantic labels such as curvature, reaction-path\
      \ defect, reasoning drift, or institutional contradiction may be attached only by a validated Domain Card.\n\n\
      ---\n\n# 6. Closure and Interaction Grammar\n\n## 6.1 Invariant closure map\n\n\\[\n\\boxed{\n\\mathcal I_\\alpha:\n\
      R_1\\otimes\\cdots\\otimes R_k\n\\longrightarrow\n\\mathbf 1\n}\n\\]\n\n\\[\n\\nu_\\alpha\n=\n\\dim\n\\operatorname{Hom}_{\\\
      mathcal A}\n\\left(\nR_1\\otimes\\cdots\\otimes R_k,\\mathbf 1\n\\right)\n\\]\n\nIf the Hom-space is zero:\n\n\
      ```yaml\nclosure_status: OBSTRUCTED\ninteraction_allowed: false\n```\n\n## 6.2 Multiplicity discipline\n\nAt minimum,\
      \ separate:\n\n```yaml\nMultiplicityLedger:\n  invariant_multiplicity:\n    meaning: number_of_independent_invariant_closure_maps\n\
      \  rank_multiplicity:\n    meaning: operator_or_matrix_rank_degeneracy\n  generation_multiplicity:\n    meaning:\
      \ repeated_retained_response_classes\n  raw_ordering_count:\n    meaning: number_of_unquotiented_sequences\n```\n\
      \nDo not infer physical channel count from raw ordering count before quotienting by:\n\n- cyclic start-point equivalence\n\
      - reversal equivalence when the reader is orientation-insensitive\n- gauge equivalence\n- reader equivalence\n\
      - structural sharing without lineage erasure\n\n## 6.3 Three-valued admissibility\n\n\\[\n\\mathcal C(\\xi\\mid\
      \ c,\\mathcal T)\\in\\{1,0,\\bot\\}\n\\]\n\n```yaml\nAdmissibility:\n  \"1\":\n    status: ADMITTED\n    action:\
      \ construct\n  \"0\":\n    status: OBSTRUCTED\n    action: append_obstruction_certificate\n  \"bottom\":\n    status:\
      \ UNRESOLVED\n    action: abstain_and_request_more_retained_information\n```\n\n`UNRESOLVED` is not equivalent\
      \ to `OBSTRUCTED`.\n\n---\n\n# 7. Universal action interface\n\n## 7.1 Modular action\n\n\\[\n\\boxed{\nS_{\\mathrm{RG}}\n\
      =\nS_{\\mathrm{DRL}}\n+\nS_{\\mathrm{geo}}\n+\nS_{\\mathrm{tr}}\n+\nS_{\\mathrm{int}}\n+\nS_{\\mathrm{ord}}\n+\n\
      S_{\\mathrm{cut}}\n+\nS_{\\mathrm{tape}}\n+\nS_{\\mathrm{read}}\n}\n\\]\n\n```yaml\nActionContracts:\n  S_DRL:\n\
      \    consumes: [Phi, Psi, G, Tape, declared_coefficients]\n    must_be:\n      - typed\n      - variational_or_explicitly_nonvariational\n\
      \      - retained_metric_compatible\n\n  S_geo:\n    consumes: [Theta, Phi, Psi, Sigma, Tape]\n    purpose:\n \
      \     - relation_update\n      - basis_motion\n      - backreaction\n\n  S_tr:\n    consumes: [U, Theta, G]\n \
      \   must_be_built_from:\n      - relative_transport\n      - holonomy\n      - retained_mismatch\n\n  S_int:\n\
      \    consumes: [closure_maps, Phi, Psi, Sigma, U]\n    restriction: \"only admitted invariant closure channels\"\
      \n\n  S_ord:\n    consumes: [Sigma, Xi, U, G]\n    purpose:\n      - retained_reference\n      - orientation_selection\n\
      \      - phase_or_order_transition\n\n  S_cut:\n    consumes: [boundary, cut_currents, closure_ledger]\n    purpose:\n\
      \      - unresolved_boundary_obligation\n      - information_crossing\n      - interface_cost\n\n  S_tape:\n  \
      \  consumes: [Tape, Gamma, Xi]\n    purpose:\n      - order_sensitivity\n      - reversal_status\n      - sequence_memory\n\
      \n  S_read:\n    consumes: [reader_family, state, coarse_readout]\n    purpose:\n      - readout_consistency\n\
      \      - microscopic_to_retained_factorization\n```\n\nStatus of this action interface:\n\n```yaml\nActionStatus:\n\
      \  universal_modular_interface: EXACT_WITHIN_ARCHITECTURE\n  unique_concrete_action_for_all_domains: OPEN\n  finite_reference_realization_below:\
      \ EXECUTABLE_REFERENCE\n```\n\n## 7.2 Constrained equation\n\nLet \\(\\lambda_n^a\\) denote constraint multipliers,\
      \ distinct from the closure ledger:\n\n\\[\n\\boxed{\nP_{\\mathrm{phys}}\n\\left[\n\\frac{\\delta S_{\\mathrm{RG}}}{\\\
      delta Z_n}\n+\n\\sum_a\n\\lambda_n^a\n\\frac{\\delta C_a[Z]}{\\delta Z_n}\n\\right]\n=0\n}\n\\]\n\nsubject to equality\
      \ constraints \\(C_a^{=}[Z]=0\\) and inequality constraints\n\\(C_b^{\\le}[Z]\\le0\\). Inequalities require the\
      \ Karush–Kuhn–Tucker conditions:\n\n\\[\n\\lambda_b\\ge0,\n\\qquad\nC_b^{\\le}[Z]\\le0,\n\\qquad\n\\lambda_b C_b^{\\\
      le}[Z]=0.\n\\]\n\nIf \\(G\\), \\(\\Theta\\), \\(U\\), \\(\\Gamma\\), or \\(\\Xi\\) is dynamical, it MUST have an\
      \ equation or update rule. Otherwise it MUST be marked `background`, `externally_prescribed`, or `derived_cache`.\n\
      \n```yaml\nVariableEquationCoverageGate:\n  for_each_state_slot:\n    require_one_of:\n      - variational_equation\n\
      \      - recurrence\n      - algebraic_constraint\n      - declared_background\n      - derived_cache_with_recompute_rule\n\
      \  fail_code: UNCOVERED_STATE_VARIABLE\n```\n\n---\n\n# 8. Reference finite DRL reader–record kernel\n\nThis section\
      \ defines an immediately implementable and fixture-testable reference realization. It is not claimed to be the\
      \ unique law of every domain.\n\n```yaml\nReferenceCoefficientContract:\n  M:\n    reference_type: positive_scalar_or_positive_definite_operator\n\
      \    requirement: M_is_invertible\n  D:\n    reference_type: nonnegative_scalar_or_positive_semidefinite_operator\n\
      \  K:\n    reference_type: nonnegative_scalar_or_declared_operator\n  dt:\n    type: positive_scalar\n  generalized_noncommuting_coefficients:\n\
      \    status: CONDITIONAL\n    requirement: explicit_ordering_and_adjoint_convention\n```\n\n## 8.1 Full operator\n\
      \n\\[\n\\mathbb G_n\n=\nL_{\\mathrm{graph},n}\\otimes I_{\\mathcal F}\n+\nI_{\\mathrm{graph},n}\\otimes C_{\\mathcal\
      \ F}\n+\nC_{\\mathrm{int},n}\n\\]\n\nmetric-adjoint:\n\n\\[\nA^{\\dagger_G}=G^{-1}A^\\dagger G\n\\]\n\nmetric symmetric/skew\
      \ split:\n\n\\[\n\\mathbb G^{(+)}\n=\n\\frac12\\left(\n\\mathbb G+\\mathbb G^{\\dagger_G}\n\\right)\n\\]\n\n\\\
      [\n\\mathbb G^{(-)}\n=\n\\frac12\\left(\n\\mathbb G-\\mathbb G^{\\dagger_G}\n\\right)\n\\]\n\nRequired checks:\n\
      \n\\[\n(\\mathbb G^{(+)})^{\\dagger_G}=\\mathbb G^{(+)},\n\\qquad\n(\\mathbb G^{(-)})^{\\dagger_G}=-\\mathbb G^{(-)}\n\
      \\]\n\nand:\n\n\\[\n\\langle z,\\mathbb G^{(-)}z\\rangle_G\n\\approx0\n\\]\n\n```yaml\nOperatorSplitStatus:\n \
      \ algebraic_split_for_given_G: DERIVED_EXACT\n  universal_physical_interpretation: CONDITIONAL\n  state_dependent_endogenous_operator_closure:\
      \ OPEN_UNLESS_INSTANCE_PROVED\n```\n\n## 8.2 Living geometry\n\n\\[\n\\Theta_{n+1}\n=\nA_\\Theta\\Theta_n\n+\n\
      B_{\\Theta\\Phi}\\Phi_n\n+\nB_{\\Theta\\Psi}\\Psi_n\n+\nu_{\\Theta,n}\n\\]\n\n\\[\n\\mathbb G[\\Theta_n]\n=\n\\\
      mathbb G_0\n+\n\\sum_a\\Theta_n^a\\mathbb G_a\n\\]\n\nmoving basis:\n\n\\[\n\\Phi_n=V_n\\phi_n\n\\]\n\n\\[\n\\\
      Delta\\Phi_n\n=\nV_{n+1}\\Delta\\phi_n\n+\n(V_{n+1}-V_n)\\phi_n\n\\]\n\ngeometry-dominance ratio:\n\n\\[\nR_{\\\
      mathrm{geo}}\n=\n\\frac{\n\\|(V_{n+1}-V_n)\\phi_n\\|\n}{\n\\|\\Delta\\Phi_n\\|\n}\n\\]\n\n```yaml\nMovingBasisGate:\n\
      \  fixed_basis_allowed_when:\n    - \"R_geo <= preregistered_tolerance\"\n  fixed_basis_rejected_when:\n    - \"\
      R_geo > preregistered_tolerance\"\n  unresolved_when:\n    - \"denominator is zero and numerator is nonzero or\
      \ basis provenance missing\"\n```\n\n## 8.3 Discrete action\n\nDefine:\n\n\\[\n\\delta_t^2X_n\n=\n\\frac{X_{n+1}-2X_n+X_{n-1}}{\\\
      Delta t^2}\n\\]\n\n\\[\n\\delta_t^cX_n\n=\n\\frac{X_{n+1}-X_{n-1}}{2\\Delta t}\n\\]\n\nreference action (real-coordinate\
      \ form; replace transpose by the declared Hermitian or metric adjoint in complex coordinates):\n\n\\[\nS_{\\mathrm{DRL}}\n\
      =\n\\sum_n\\mathbb L^n\n\\]\n\n\\[\n\\begin{aligned}\n\\mathbb L^n\n=&\n\\frac1{\\Delta t}\n\\Delta\\Phi_n^\\top\
      \ M_n\\Delta\\Psi_n\\\\\n&+\n\\frac12\n\\left(\n\\Phi_n^\\top D_n\\Delta\\Psi_n\n-\n\\Psi_n^\\top D_n\\Delta\\\
      Phi_n\n\\right)\\\\\n&-\n\\Delta t\n\\left[\nK_n\\Phi_n^\\top\\mathbb G_n\\Psi_n\n+\n\\Psi_n^\\top\\nabla V_n(\\\
      Phi_n)\n-\nJ_n^\\top\\Psi_n\n\\right].\n\\end{aligned}\n\\]\n\n## 8.4 Coupled recurrence\n\nReader:\n\n\\[\nM\\\
      delta_t^2\\Phi_n\n+\nD\\delta_t^c\\Phi_n\n+\nK\\mathbb G[\\Theta_n]\\Phi_n\n+\n\\nabla V(\\Phi_n)\n-\nJ_n\n=\n\\\
      mathcal R_{\\Phi,n}\n\\]\n\nRecord:\n\n\\[\nM\\delta_t^2\\Psi_n\n-\nD\\delta_t^c\\Psi_n\n+\nK\\mathbb G[\\Theta_n]^{\\\
      dagger_G}\\Psi_n\n+\n\\nabla^2V(\\Phi_n)\\Psi_n\n=\n\\mathcal R_{\\Psi,n}\n\\]\n\nresidual channels:\n\n\\[\n\\\
      mathcal R_\\Phi\n=\n\\mathcal J_{\\mathrm{cut},\\Phi}\n+\n\\mathcal J_{\\mathrm{syn}}\n+\n\\mathcal J_{\\mathrm{geo}}\n\
      \\]\n\n\\[\n\\mathcal R_\\Psi\n=\n\\mathcal J_{\\mathrm{cut},\\Psi}\n+\n\\mathcal J_{\\mathcal L}\n\\]\n\ncut current:\n\
      \n\\[\n\\mathcal J_C\n=\n\\mathcal J_{\\mathrm{transport}}\n+\n\\mathcal J_{\\mathrm{return}}\n+\n\\mathcal J_{\\\
      mathrm{readout}}\n+\n\\mathcal J_{\\mathrm{tape}}\n\\]\n\n## 8.5 One-step solve\n\nFor scalar \\(M,D,K\\) multiplying\
      \ the identity:\n\n\\[\nA_\\Phi\n=\n\\left(\n\\frac{M}{\\Delta t^2}\n+\n\\frac{D}{2\\Delta t}\n\\right)I\n\\]\n\
      \n\\[\n\\begin{aligned}\nb_{\\Phi,n}\n=&\n\\mathcal R_{\\Phi,n}\n+\nJ_n\n-\nK\\mathbb G_n\\Phi_n\n-\n\\nabla V(\\\
      Phi_n)\\\\\n&+\n\\frac{2M}{\\Delta t^2}\\Phi_n\n+\n\\left(\n\\frac{D}{2\\Delta t}\n-\n\\frac{M}{\\Delta t^2}\n\\\
      right)\\Phi_{n-1}\n\\end{aligned}\n\\]\n\n\\[\nA_\\Phi\\Phi_{n+1}=b_{\\Phi,n}\n\\]\n\n\\[\nA_\\Psi\n=\n\\left(\n\
      \\frac{M}{\\Delta t^2}\n-\n\\frac{D}{2\\Delta t}\n\\right)I\n\\]\n\n\\[\n\\begin{aligned}\nb_{\\Psi,n}\n=&\n\\\
      mathcal R_{\\Psi,n}\n-\nK\\mathbb G_n^{\\dagger_G}\\Psi_n\n-\n\\nabla^2V(\\Phi_n)\\Psi_n\\\\\n&+\n\\frac{2M}{\\\
      Delta t^2}\\Psi_n\n-\n\\left(\n\\frac{M}{\\Delta t^2}\n+\n\\frac{D}{2\\Delta t}\n\\right)\\Psi_{n-1}\n\\end{aligned}\n\
      \\]\n\n\\[\nA_\\Psi\\Psi_{n+1}=b_{\\Psi,n}\n\\]\n\n```yaml\nLinearSolveGate:\n  method:\n    reference: partial_pivot_gauss_jordan_or_stable_equivalent\n\
      \  must_report:\n    - pivot_min\n    - rank\n    - condition_estimate\n    - solver_residual\n  fail_when:\n \
      \   - \"pivot_min < pivot_tolerance\"\n    - \"rank < expected_rank\"\n    - \"solver_residual > solve_tolerance\"\
      \n  must_not:\n    - \"silently regularize\"\n    - \"replace singular solve with guessed output\"\n```\n\n## 8.6\
      \ Reference runtime algorithm\n\n```pseudo\nFUNCTION DRL_STEP(run, state_n_minus_1, state_n):\n\n    VALIDATE dt\
      \ > 0\n    VALIDATE G is positive definite\n    VALIDATE every state slot has provenance and type\n\n    Theta_next_candidate\
      \ = UPDATE_GEOMETRY(state_n)\n    Gop_n = BUILD_OPERATOR(Theta_n, graph, field_coupling, interaction)\n\n    SPLIT\
      \ Gop_n into metric-symmetric and metric-skew sectors\n    CHECK split residuals\n\n    COMPUTE moving-basis current\n\
      \    COMPUTE R_geo\n    IF fixed_basis_requested AND R_geo > tolerance:\n        RETURN FAIL(GEOMETRY_REDUCTION_INVALID)\n\
      \n    COMPUTE closure channels\n    APPEND obstruction certificates for rejected channels\n\n    ASSEMBLE R_Phi\
      \ and R_Psi by named current channels\n\n    BUILD A_Phi, b_Phi\n    SOLVE A_Phi * Phi_next = b_Phi using fail-closed\
      \ solver\n\n    BUILD A_Psi, b_Psi\n    SOLVE A_Psi * Psi_next = b_Psi using fail-closed solver\n\n    RECOMPUTE\
      \ Theta_next if geometry uses implicit backreaction\n    RECOMPUTE transport U if local frames changed\n\n    COMPUTE\
      \ equation residuals\n    COMPUTE constraints\n    COMPUTE invariants\n    APPEND state, residuals, obstructions\
      \ and deviations to Tape\n\n    IF any hard invariant fails:\n        RETURN FAIL\n    IF any required fact remains\
      \ unidentified:\n        RETURN UNRESOLVED\n    RETURN PASS_WITH_OUTPUT\nEND\n```\n\n---\n\n# 9. Optional legacy\
      \ single-field stepper\n\nFor legacy compatibility, the following reduced reference is permitted:\n\n```pseudo\n\
      gamma = 1 / tau_c\nD_s = D * Delta_theta\n\nV[n+1] = V[n] + Delta_theta * (\n    -gamma * V[n]\n    -D_s * (L_R\
      \ @ X[n])\n    + source[n]\n    - residual[n]\n)\n\nX[n+1] = X[n] + Delta_theta * V[n+1]\n```\n\nsufficient stability\
      \ bound:\n\n\\[\n\\Delta\\theta\n\\le\n\\frac{2}{\n\\gamma+\n\\sqrt{\\gamma^2+4\\lambda_{\\max}D_s}\n}\n\\]\n\n\
      Constraints:\n\n```yaml\nLegacyStepperRules:\n  status: REDUCED_REFERENCE\n  cfl_bound:\n    meaning: sufficient_not_necessary\n\
      \  must_not_claim:\n    - \"exceeding the bound implies unconditional instability\"\n    - \"single-field stepper\
      \ is the complete two-field ontology\"\n    - \"scalar eigenmode represents the full operator without discarded-coupling\
      \ audit\"\n```\n\n---\n\n# 10. Physical Projector and Positive Transfer\n\n## 10.1 Physical projector\n\n\\[\n\
      P_{\\mathrm{phys}}^\\dagger=P_{\\mathrm{phys}},\n\\qquad\nP_{\\mathrm{phys}}^2=P_{\\mathrm{phys}}\n\\]\n\nProjector\
      \ construction MUST be traceable to a declared redundancy or constraint sector.\n\n```yaml\nPhysicalProjectorGate:\n\
      \  checks:\n    - hermitian\n    - idempotent\n    - removes_only_declared_redundancy\n    - preserves_declared_readout\n\
      \  fail_code: INVALID_PHYSICAL_PROJECTOR\n```\n\n## 10.2 Positive kernel\n\n\\[\nK(X_+,X_-)\n=\n\\sum_Y\nA(Y\\\
      mid X_+)\n\\overline{A(Y\\mid X_-)}\n\\]\n\n\\[\nK=A^\\dagger A\\succeq0\n\\]\n\n\\[\nT_+\n=\nP_{\\mathrm{phys}}\n\
      e^{-\\widehat V/2}\nK\ne^{-\\widehat V/2}\nP_{\\mathrm{phys}}\n\\succeq0,\n\\qquad\n\\widehat V=\\widehat V^\\\
      dagger\n\\]\n\nThe term `reflection-positive` is permitted only when the following are supplied:\n\n- reflection\
      \ map\n- positive half-algebra\n- gluing rule\n- compatible measure/action\n\nIf only \\(A^\\dagger A\\) is established,\
      \ use the term `positive midpoint kernel`.\n\n## 10.3 Contraction certificate\n\nPositivity alone does not place\
      \ eigenvalues in \\((0,1]\\).\n\nRequire:\n\n\\[\n0\\preceq T_{\\mathrm{RG}}\\preceq I\n\\]\n\nor:\n\n\\[\n\\|T_{\\\
      mathrm{RG}}\\|_{\\mathrm{op}}\\le1\n\\]\n\nIf scaling is used:\n\n\\[\nT_{\\mathrm{RG}}\n=\n\\frac{T_+}{\\zeta},\n\
      \\qquad\n\\zeta>0,\n\\qquad\n\\zeta\\ge\\lambda_{\\max}(T_+)\n\\]\n\nThe normalization \\(\\zeta\\) MUST be declared\
      \ and recorded; it may not be hidden.\n\n## 10.4 Spectral reader\n\n\\[\nT_{\\mathrm{RG}}|\\phi_s\\rangle\n=\n\\\
      lambda_s|\\phi_s\\rangle\n\\]\n\nFor \\(a>0\\) and \\(0<\\lambda_s\\le1\\):\n\n\\[\n\\epsilon_s\n=\n-\\frac1a\\\
      log\\lambda_s\n\\]\n\n```yaml\nSpectralClassification:\n  isolated_eigenvalue:\n    root_name: stable_retained_mode\n\
      \  isolated_below_continuum:\n    root_name: bound_or_composite_mode\n  zero_edge:\n    root_name: scale_free_or_gapless_mode\n\
      \  positive_continuum_edge:\n    root_name: threshold_persistence\n  no_projected_support:\n    root_name: no_standalone_readout\n\
      ```\n\nA resonance as a complex pole does not follow directly from a positive self-adjoint spectrum; it requires\
      \ a declared extension:\n\n```yaml\nResonanceExtension:\n  requires:\n    - resolvent_or_scattering_object\n  \
      \  - analytic_continuation_rule\n    - sheet_and_boundary_conditions\n  status_if_absent: NOT_AVAILABLE\n```\n\n\
      ---\n\n# 11. Order selection\n\n\\[\nr=\\Sigma^\\dagger G\\Sigma\\ge0\n\\]\n\n\\[\nV_0(r)=\\alpha r+\\beta r^2,\n\
      \\qquad\n\\beta>0\n\\]\n\n\\[\nK_\\mu(r)=B_\\mu(r)B_\\mu(r)^\\dagger\n\\]\n\n\\[\nZ_\\mu(r)=\\det(I+K_\\mu(r))\n\
      \\]\n\n\\[\nV_{\\mathrm{eff}}(r)\n=\nV_0(r)-\\sum_\\mu\\log Z_\\mu(r)\n\\]\n\nFor eigenvalues \\(\\lambda_\\mu\
      \ r\\) with multiplicity \\(d_\\mu\\):\n\n\\[\nV_{\\mathrm{eff}}(r)\n=\n\\alpha r+\\beta r^2\n-\n\\sum_\\mu\nd_\\\
      mu\\log(1+\\lambda_\\mu r)\n\\]\n\n\\[\nV_{\\mathrm{eff}}'(0)\n=\n\\alpha-\\sum_\\mu d_\\mu\\lambda_\\mu\n\\]\n\
      \nlocal onset criterion:\n\n\\[\n\\boxed{\n\\sum_\\mu d_\\mu\\lambda_\\mu>\\alpha\n}\n\\]\n\n```yaml\nOrderSelectionClaim:\n\
      \  exact_scope:\n    - declared_effective_potential\n    - local_slope_at_origin\n  not_implied:\n    - global_uniqueness\n\
      \    - empirical_phase_identity\n    - physical_energy_interpretation\n```\n\n---\n\n# 12. Coarse-Graining, Reduction,\
      \ and Fixed Points\n\n## 12.1 Readout-preserving coarse-graining\n\n\\[\nZ^{(b)}=\\mathcal C_b[Z]\n\\]\n\n\\[\n\
      \\boxed{\n\\mathcal O_D^{(b)}\n\\circ\n\\mathcal C_b\n=\n\\mathcal O_D\n}\n\\]\n\ndefect:\n\n\\[\n\\epsilon_{\\\
      mathrm{cg}}\n=\n\\left\\|\n\\mathcal O_D^{(b)}\\mathcal C_b-\\mathcal O_D\n\\right\\|\n\\]\n\noptional formal effective\
      \ action:\n\n\\[\nS_{\\mathrm{RG}}^{(b)}\n=\n-\\log\n\\int_{\\mathcal C_b[Z]=Z^{(b)}}\ne^{-S_{\\mathrm{RG}}[Z]}\\\
      ,d\\mu[Z]\n\\]\n\nThis expression is `OPTIONAL_FORMAL` unless the Domain Card supplies the measure, domain of\n\
      integration, finiteness/integrability conditions, and a computable approximation rule.\n\nfixed point:\n\n\\[\n\
      \\mathcal R_b(\\theta_*)=\\theta_*\n\\]\n\nirrelevant distinction certificate:\n\n\\[\n\\|\\delta\\theta_n\\|\n\
      \\le\n\\rho^n\\|\\delta\\theta_0\\|,\n\\qquad\n\\rho<1\n\\]\n\n## 12.2 No-early-collapse law\n\nIf an encoding\
      \ \\(E\\) satisfies:\n\n\\[\nE(z)=E(z')\n\\quad\\text{but}\\quad\nz\\ne z'\n\\]\n\nno downstream solver can recover\
      \ the distinction from that input alone.\n\n```yaml\nNoEarlyCollapse:\n  rule: \"compress only after equivalence\
      \ is audited\"\n  correction_if_failed:\n    - enlarge_candidate_state\n    - restore_lineage_or_tape\n    - increase_resolution\n\
      \  forbidden_correction:\n    - redefine_output_to_hide_missing_distinction\n    - import_target_law\n```\n\n##\
      \ 12.3 Modal reduction audit\n\nFor a projector \\(P\\):\n\n\\[\n\\epsilon_{\\mathrm{mode}}\n=\n\\|(I-P)\\mathbb\
      \ GP\\|\n+\n\\|P\\mathbb G(I-P)\\|\n\\]\n\nA scalar or single-mode reduction is admissible only when:\n\n1. the\
      \ quotient is valid\n2. one mode is sufficient for the declared readout\n3. off-diagonal, skew, and moving-basis\
      \ currents are below tolerance\n4. geometry is fixed or externally prescribed\n5. no required retained nonlinear\
      \ transfer exists between modes\n\n```yaml\nModalReductionGate:\n  pass_when:\n    - \"epsilon_mode <= preregistered_tolerance\"\
      \n    - \"all five conditions hold\"\n  fail_code: SCALAR_EIGENMODE_REDUCTION_ERROR\n```\n\n---\n\n# 13. Executable\
      \ Domain Card\n\n```yaml\nDomainCard:\n  schema_version: 1.0\n\n  identity:\n    domain_id: REQUIRED\n    version:\
      \ REQUIRED\n    parent_root_version: REQUIRED\n    status: DRAFT\n\n  question:\n    target: REQUIRED\n    horizon:\
      \ REQUIRED\n    resolution: REQUIRED\n    interventions: REQUIRED\n    tolerance: REQUIRED\n    context: REQUIRED\n\
      \n  candidate_state:\n    encoder: REQUIRED\n    slot_activation: REQUIRED\n    fields:\n      count: DISCOVER_OR_JUSTIFY\n\
      \      types: REQUIRED\n    memory_slots: REQUIRED\n    boundary_slots: REQUIRED\n    lineage_slots: REQUIRED\n\
      \n  carriers:\n    types: REQUIRED\n    dimensions_or_shapes: REQUIRED\n    closure_category_or_representation_rule:\
      \ REQUIRED_IF_CLOSURE_USED\n    primitive_relations: REQUIRED\n    provenance_for_each_relation: REQUIRED\n   \
      \ local_frames: REQUIRED_IF_TRANSPORT_USED\n    ordered_cycles: REQUIRED_IF_HOLONOMY_USED\n\n  readers:\n    family:\
      \ REQUIRED\n    equivalence_rule: REQUIRED\n    future_readout_rule: REQUIRED\n    physical_outputs: REQUIRED\n\
      \n  invariants:\n    set: REQUIRED\n    completion_audit: REQUIRED\n\n  symmetries:\n    query_relative_group:\
      \ REQUIRED\n    quotient_justification: REQUIRED\n\n  constraints:\n    closure_rules: REQUIRED\n    admissibility_rules:\
      \ REQUIRED\n    conserved_readouts: OPTIONAL\n\n  dynamics:\n    root_kernel: REQUIRED\n    graph_operator: REQUIRED\n\
      \    field_operator: REQUIRED\n    interaction_operator: OPTIONAL\n    coefficients: REQUIRED\n    currents: REQUIRED\n\
      \    basis_history: REQUIRED_IF_MOVING_BASIS_AUDITED\n    requested_projection: OPTIONAL\n    allowed_reductions:\
      \ REQUIRED\n    forbidden_reductions: REQUIRED\n    context_dependence: REQUIRED\n    requests_transfer: REQUIRED\n\
      \    physical_projector: REQUIRED_IF_TRANSFER_REQUESTED\n    midpoint_amplitude: REQUIRED_IF_TRANSFER_REQUESTED\n\
      \    potential_operator: REQUIRED_IF_TRANSFER_REQUESTED\n\n  calibration:\n    native_units: REQUIRED\n    target_units:\
      \ OPTIONAL\n    decoder: OPTIONAL\n    parameters: DECLARED\n    training_data: DECLARED\n    freeze_hash: REQUIRED_IF_CALIBRATED\n\
      \    held_out_outputs: REQUIRED_IF_PREDICTIVE\n\n  semantics:\n    labels: ATTACH_AFTER_TRANSLATION\n    semantic_lane:\
      \ REQUIRED_FOR_NAMED_QUANTITY\n\n  defect_metrics:\n    norm_for_each_defect: REQUIRED\n    tolerance_for_each_defect:\
      \ REQUIRED\n    exact_or_floating_arithmetic: REQUIRED\n\n  evidence:\n    positive_controls: REQUIRED_IF_EVIDENTIARY\n\
      \    negative_controls: REQUIRED_IF_EVIDENTIARY\n    exact_proofs: OPTIONAL\n    numerical_tests: OPTIONAL\n  \
      \  empirical_tests: OPTIONAL\n\n  provenance:\n    root_derived: list\n    architecture_declared: list\n    empirical_input:\
      \ list\n    calibration_only: list\n    external_comparison: list\n    open_hypothesis: list\n\n  forbidden_imports:\n\
      \    - domain_final_law_as_root\n    - target_answer_as_parameter\n    - semantic_name_before_gate\n    - fit_each_output_separately\n\
      \    - physical_unit_without_calibration\n    - checker_outcome_visible_to_maker\n```\n\n---\n\n# 14. Seven general\
      \ domain gates\n\n## Gate 1 — No-Free-Domain-Law\n\n\\[\n\\delta_R+\\mathrm{Retention}\n\\nRightarrow\n(F,\\mathcal\
      \ C,V,\\theta)_{\\mathrm{domain}}\n\\]\n\nIf more than one compatible model remains:\n\n```yaml\nstatus: UNRESOLVED\n\
      required_next_input:\n  - interaction_tape\n  - intervention\n  - observation\n  - explicit_postulate\n```\n\n\
      ## Gate 2 — Three-Valued Admissibility\n\nReturn only `ADMITTED`, `OBSTRUCTED`, or `UNRESOLVED`; do not guess.\n\
      \n## Gate 3 — Context-Indexed Law\n\n\\[\nF_n=F_n(Z_n,c_n,\\mathcal T_n)\n\\]\n\nValidity in \\(c\\) does not imply\
      \ validity in \\(c'\\).\n\n## Gate 4 — State Sufficiency\n\n\\[\n\\mathrm{Suff}_{D,L}\n(\\mathfrak Z_D^{\\mathrm{cand}};c,\\\
      mathcal T)\n\\in\\{1,0,\\bot\\}\n\\]\n\nAudit at least:\n\n- readout sufficiency\n- dynamic sufficiency\n- intervention\
      \ sufficiency\n- delayed-return/memory sufficiency\n- coupling sufficiency\n- geometry/basis sufficiency\n- boundary\
      \ sufficiency\n\n## Gate 5 — Invariant Completion\n\nIf a quotient merges states separated by a required invariant,\
      \ refine the partition.\n\n## Gate 6 — Query-Relative Symmetry\n\n\\[\n\\mathcal H_D\n=\n\\{\nh:\nO_D(hz)=O_D(z),\n\
      \\;\nhF=Fh\n\\}\n\\]\n\n## Gate 7 — Calibration Firewall\n\n\\[\ny_D^{\\mathrm{known}}\n=\nU_D(r_{\\mathrm{native}};\\\
      theta_D,c,\\mathcal C_D^{\\mathrm{cal}})\n\\]\n\n\\[\nH_{\\mathrm{cal}}\n=\n\\mathrm{Hash}\n(\nU_D,\\theta_D,\\\
      mathrm{training},\n\\mathrm{units},\\mathrm{protocol}\n)\n\\]\n\nA native informational value is not a physical,\
      \ chemical, or biological observable before independent calibration.\n\n---\n\n# 15. Domain compilation algorithm\n\
      \n```pseudo\nFUNCTION COMPILE_DOMAIN(root, raw_tape, domain_card_draft):\n\n    1. VALIDATE root version and philosophy\
      \ constitution.\n    2. CAPTURE phenomenon without mechanism labels.\n    3. STRIP domain vocabulary into retained\
      \ roles.\n    4. FREEZE question, horizon, interventions and tolerance.\n    5. BUILD candidate state encoder.\n\
      \    6. RUN state sufficiency audit.\n       IF FAIL: enlarge state and restart with new version.\n       IF UNRESOLVED:\
      \ abstain.\n    7. DISCOVER minimal field count and coupling structure.\n    8. DISCOVER candidate partition using\
      \ future readout signatures.\n    9. DISCOVER query-relative automorphisms.\n   10. BUILD quotient q_D.\n   11.\
      \ BUILD coarse dynamics F_D_sharp.\n   12. COMPUTE epsilon_dyn, epsilon_read, epsilon_inv.\n   13. REFINE partition\
      \ until exact, tolerated approximate, or impossible.\n   14. ENUMERATE invariant closure channels.\n   15. BUILD\
      \ full operator; do not diagonalize prematurely.\n   16. AUDIT modal and moving-basis defects.\n   17. RUN native\
      \ dynamics.\n   18. BUILD positive transfer when requested.\n   19. CALIBRATE only after native outputs are frozen.\n\
      \   20. RUN independent held-out checker.\n   21. RETURN DomainRunReport + ClaimLedger.\nEND\n```\n\nfield count\
      \ rule:\n\n\\[\nm_D\n=\n\\min\n\\left\\{\nm:\nO_D\\ \\text{ and }\\ F_D\n\\text{ close on }X^{(1:m)}\n\\right\\\
      }\n\\]\n\nThe number of fields is not the number of domains.\n\n---\n\n# 16. Cross-domain bridge\n\n\\[\nK_{A\\\
      leftarrow B}:\n\\mathcal D_B\\times\\mathcal T\n\\to\n\\widehat{\\mathcal D}_A\n\\]\n\nexact bridge:\n\n\\[\nK_{A\\\
      leftarrow B}F_B^\\sharp\n=\nF_A^\\sharp K_{A\\leftarrow B}\n\\]\n\n\\[\nO_A^\\sharp K_{A\\leftarrow B}\n=\nD_{A\\\
      leftarrow B}O_B^\\sharp\n\\]\n\nbridge error:\n\n\\[\n\\epsilon_{A\\leftarrow B}\n=\nd_\\Delta\n(\n\\mathcal D_A,\n\
      \\widehat{\\mathcal D}_A\n)\n\\]\n\n```yaml\nBridgeLevels:\n  L0:\n    name: surface_analogy\n  L1:\n    name:\
      \ shared_variables_or_relations\n  L2:\n    name: shared_transition_signature\n  L3:\n    name: readout_preserving_map\n\
      \  L4:\n    name: dynamically_commuting_quotient\n  L5:\n    name: recoverable_bidirectional_equivalence\n```\n\
      \nEquations that merely look alike may be reported at no more than L0/L1 until stronger gates pass.\n\n---\n\n\
      # 17. Defect vector\n\ncanonical vector:\n\n\\[\n\\boxed{\n\\boldsymbol\\epsilon_D\n=\n\\begin{pmatrix}\n\\epsilon_{\\\
      mathrm{suff}}\\\\\n\\epsilon_{\\mathrm{dyn}}\\\\\n\\epsilon_{\\mathrm{read}}\\\\\n\\epsilon_{\\mathrm{inv}}\\\\\
      \n\\epsilon_{\\mathrm{bridge}}\\\\\n\\epsilon_{\\mathrm{cal}}\\\\\n\\epsilon_{\\mathrm{mode}}\\\\\n\\epsilon_{\\\
      mathrm{geo}}\\\\\n\\epsilon_{\\mathrm{solve}}\n\\end{pmatrix}\n}\n\\]\n\n```yaml\nDefectRules:\n  exact:\n    condition:\
      \ \"every required component equals zero in exact arithmetic\"\n  numerical_pass:\n    condition: \"every required\
      \ component <= preregistered tolerance\"\n  fail:\n    condition: \"any required component > tolerance\"\n  unresolved:\n\
      \    condition: \"a required component cannot be identified\"\n  report:\n    rule: \"never collapse named defects\
      \ into one scalar without retaining the full vector\"\n```\n\n---\n\n# 18. Maker–Checker epistemic firewall\n\n\
      ## 18.1 Roles\n\n```yaml\nRegistrar:\n  freezes:\n    - question\n    - allowed_inputs\n    - forbidden_inputs\n\
      \    - metrics\n    - thresholds\n    - failure_rules\n    - dataset_split\n    - software_versions\n\nMaker:\n\
      \  may:\n    - propose_state\n    - discover_partition\n    - build_operator\n    - calibrate_on_training_only\n\
      \    - produce_prediction\n  must_not_see:\n    - held_out_outputs\n    - checker_only_labels\n    - answer_derived_threshold\n\
      \    - post_freeze_report\n\nFreeze:\n  hash_contents:\n    - model\n    - code\n    - configuration\n    - parameters\n\
      \    - prediction\n    - score_orientation\n    - normal_form\n    - dependencies\n\nChecker:\n  may:\n    - verify_hash\n\
      \    - open_held_out\n    - evaluate_controls\n    - compute_errors\n    - audit_claim_scope\n  must_not:\n   \
      \ - swap_model\n    - retune_parameters\n    - change_threshold\n    - flip_metric\n    - cherry_pick\n\nAuditor:\n\
      \  outputs:\n    - scope_audit\n    - protocol_deviations\n    - bounded_claim\n```\n\n\\[\n\\mathrm{Info}(\\mathrm{Maker};Y_{\\\
      mathrm{checker}})=0\n\\]\n\nThis is a protocol condition, not a proof that statistical mutual information is zero\
      \ merely because a hash exists.\n\n## 18.2 Fail-able gate law\n\n```yaml\nFailAbleGateLaw:\n  Type_P_evidence_requires:\n\
      \    - machine_derived_passing_control\n    - machine_derived_failing_control\n  Type_U_convention_when:\n    -\
      \ only_passing_control_exists\n    - failure_case_cannot_change_gate_output\n  tier_consequence:\n    Type_P_pass:\
      \ \"may support finite or machine-checked status within scope\"\n    Type_U_pass: \"supports at most architecture/conditional\
      \ wording\"\n```\n\nThis law tests whether a gate can discriminate; Maker–Checker tests leakage and process bias.\
      \ Both are required.\n\n## 18.3 Protocol deviation\n\n\\[\n\\mathcal T_{n+1}\n=\n\\mathcal T_n\n\\boxplus\n\\mathrm{DeviationRecord}\n\
      \\]\n\nDeviation records are append-only and MUST NOT be overwritten.\n\n---\n\n# 19. Claim ledger\n\n```yaml\n\
      Claim:\n  id: REQUIRED\n  statement: REQUIRED\n\n  status:\n    one_of:\n      - ROOT_AXIOM\n      - DEFINITION\n\
      \      - DERIVED_EXACT\n      - MACHINE_CHECKED_SCOPE\n      - EXACT_WITHIN_ARCHITECTURE\n      - CONDITIONAL\n\
